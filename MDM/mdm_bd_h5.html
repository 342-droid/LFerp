<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冷丰 MDM · 门店扫码 H5</title>
    <link rel="stylesheet" href="../css/mdm-bd-mobile.css">
</head>
<body class="mdm-bd-body" data-bd-base="">
    <div class="bd-mobile-shell">
        <div id="h5-root" class="bd-scroll"></div>
    </div>
    <script src="../js/path-prefix.js"></script>
    <script>window.bdPage = function (f) { return window.wmsPath && wmsPath.page ? wmsPath.page(f) : f; };</script>
    <script src="../js/mdm-bd-common.js"></script>
    <script>
        (function () {
            function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }
            var qs = function () {
                var p = {};
                location.search.slice(1).split('&').forEach(function (x) {
                    var a = x.split('='); if (a[0]) p[decodeURIComponent(a[0])] = decodeURIComponent((a[1] || '').replace(/\+/g, ' '));
                });
                return p;
            };
            function mount () {
                var root = document.getElementById('h5-root');
                var route = location.hash.replace(/^#/, '') || 'register';
                if (route === 'status') {
                    root.innerHTML =
                        '<div class="bd-page-bar"><h1 style="margin-left:0;padding-left:8px">提交结果</h1></div>' +
                        '<div style="padding:32px 20px;text-align:center;font-size:14px;line-height:1.8">' +
                        '<p style="font-size:42px;margin:0">✓</p>' +
                        '<p style="font-weight:700;margin:16px 0 8px">资料已提交</p>' +
                        '<p style="color:var(--bd-muted)">我们将在 1–3 个工作日内完成审核。</p>' +
                        '<button type="button" class="bd-btn bd-btn-primary" style="margin-top:24px;width:100%;border-radius:12px" onclick="location.hash=\'#register\'">' +
                        '返回修改</button></div>';
                    return;
                }
                root.innerHTML =
                    '<div class="bd-page-bar"><h1 style="margin-left:0;padding-left:8px">门店资料</h1></div>' +
                    '<div style="padding:16px;font-size:14px;line-height:1.6">' +
                    '<p style="color:var(--bd-muted);font-size:12px;margin-top:0">店长补充资料入口，对齐 bd-guanli StoreEditForm/H5。</p>' +
                    '<label>门店名称<input id="h5n" style="display:block;width:100%;margin:6px 0 12px;padding:10px;border:1px solid var(--bd-border);border-radius:10px"/></label>' +
                    '<label>联系人<input id="h5c" style="display:block;width:100%;margin:6px 0 12px;padding:10px;border:1px solid var(--bd-border);border-radius:10px"/></label>' +
                    '<label>电话<input id="h5p" style="display:block;width:100%;margin:6px 0 12px;padding:10px;border:1px solid var(--bd-border);border-radius:10px"/></label>' +
                    '<button type="button" class="bd-btn bd-btn-primary" style="width:100%;margin-top:8px;border-radius:12px" id="h5go">提交</button>' +
                    '<p style="font-size:11px;color:var(--bd-muted);margin-top:14px">storeId 参数：' + esc(qs().storeId || '无') + '</p></div>';
                document.getElementById('h5go').onclick = function () {
                    bdToast('已提交');
                    location.hash = '#status';
                };
            }
            window.addEventListener('hashchange', mount);
            mount();
        })();
    </script>
</body>
</html>
