<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冷丰 MDM · BD 页面未找到</title>
    <link rel="stylesheet" href="../css/mdm-bd-mobile.css">
</head>
<body class="mdm-bd-body" data-bd-base="">
    <div class="bd-mobile-shell">
        <div class="bd-scroll" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:360px;padding:24px;text-align:center">
            <p style="font-size:52px;margin:0;opacity:.35">404</p>
            <p style="font-weight:700;margin:12px 0 6px;font-size:16px">页面不存在</p>
            <p style="color:var(--bd-muted);font-size:13px;margin:0 0 20px;line-height:1.5">对应 bd-guanli NotFound。请从工作台重新进入。</p>
            <button type="button" class="bd-btn bd-btn-primary" style="border-radius:12px;padding:10px 28px" onclick="location.href=(window.wmsPath&&wmsPath.page?wmsPath.page('mdm_bd_workbench.html'):'mdm_bd_workbench.html')">回首页</button>
        </div>
        <div id="bd-bottom-tab-slot"></div>
    </div>
    <script src="../js/path-prefix.js"></script>
    <script>window.bdPage = function (f) { return window.wmsPath && wmsPath.page ? wmsPath.page(f) : f; };</script>
    <script src="../js/mdm-bd-common.js"></script>
    <script>bdRenderBottomTabs('home');</script>
</body>
</html>
