<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冷丰 MDM · BD 工作台</title>
    <link rel="stylesheet" href="../css/mdm-bd-mobile.css">
</head>
<body class="mdm-bd-body" data-bd-base="">
    <div class="bd-mobile-shell">
        <div class="bd-user-strip">
            <div class="avatar">李</div>
            <div class="name">李泽峰 · BD 工作台</div>
        </div>
        <div id="bdWorkbenchMain" class="bd-scroll" style="position:relative"></div>
        <div id="bd-bottom-tab-slot"></div>
        <button type="button" id="bdFabQr" aria-label="二维码"
            style="position:absolute;bottom:calc(64px + env(safe-area-inset-bottom, 0px));right:16px;width:48px;height:48px;border:none;border-radius:50%;background:var(--bd-primary);color:#fff;font-size:20px;box-shadow:0 4px 14px rgba(37,99,235,.4);cursor:pointer;z-index:60">▦</button>
    </div>
    <div class="bd-modal" id="bdQrMenu">
        <div class="bd-modal-box" style="max-width:340px;border-radius:16px;padding:20px 18px 16px">
            <h3 style="margin:0 0 4px;font-size:16px;font-weight:700">选择二维码类型</h3>
            <p style="font-size:12px;color:var(--bd-muted);margin:0 0 14px;line-height:1.45">请选择本次要展示的二维码用途。</p>
            <div style="display:flex;flex-direction:column;gap:12px;padding-top:4px">
                <button type="button" class="bd-qr-type-row" data-qr-store>
                    <span class="bd-qr-ic bg-p">🏪</span>
                    <span class="bd-qr-mid">
                        <span class="bd-qr-t">门店入驻二维码</span>
                        <span class="bd-qr-d">店长扫码或打开分享链接 → 浏览器内创建门店，完成后绑定您的 BD</span>
                    </span>
                    <span class="bd-qr-ch" aria-hidden="true">›</span>
                </button>
                <button type="button" class="bd-qr-type-row" data-qr-inv>
                    <span class="bd-qr-ic bg-e">👥</span>
                    <span class="bd-qr-mid">
                        <span class="bd-qr-t">邀请好友成为 BD</span>
                        <span class="bd-qr-d">进入邀请页查看邀请码与专属二维码</span>
                    </span>
                    <span class="bd-qr-ch" aria-hidden="true">›</span>
                </button>
            </div>
        </div>
    </div>
    <script src="../js/path-prefix.js"></script>
    <script>window.bdPage = function (f) { return window.wmsPath && wmsPath.page ? wmsPath.page(f) : f; };</script>
    <script src="../js/mdm-bd-common.js"></script>
    <script src="../js/mdm-bd-data-revenue.js"></script>
    <script src="../js/mdm-bd-data-reportcharts.js"></script>
    <script src="../js/mdm-bd-workbench-app.js"></script>
    <script>
        (function () {
            var menu = document.getElementById('bdQrMenu');
            var fab = document.getElementById('bdFabQr');
            var closeBtn = document.getElementById('bdQrClose');
            fab.onclick = function () {
                menu.classList.add('bd-show');
            };
            if (closeBtn) closeBtn.onclick = function () {
                menu.classList.remove('bd-show');
            };
            menu.addEventListener('click', function (e) {
                if (e.target === menu) menu.classList.remove('bd-show');
            });
            menu.querySelector('[data-qr-store]').onclick = function () {
                menu.classList.remove('bd-show');
                location.href = (window.bdPage || function (x) { return x; })('mdm_bd_personal.html#store-qr');
            };
            menu.querySelector('[data-qr-inv]').onclick = function () {
                menu.classList.remove('bd-show');
                location.href = (window.bdPage || function (x) { return x; })('mdm_bd_personal.html#invite');
            };
        })();
    </script>
</body>
</html>
