<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>手机快速登录 · 用户 APP</title>
  <link rel="stylesheet" href="../css/user-app-shell.css">
  <link rel="stylesheet" href="../css/user-app-login.css">
</head>
<body class="user-app-body">
  <div class="ua-mobile-shell ua-mobile-shell--login">
    <div class="ua-phone-login-screen">
      <div class="ua-phone-login-decor" aria-hidden="true">
        <span class="ua-phone-login-decor__blob ua-phone-login-decor__blob--1"></span>
        <span class="ua-phone-login-decor__blob ua-phone-login-decor__blob--2"></span>
        <span class="ua-phone-login-decor__blob ua-phone-login-decor__blob--3"></span>
        <span class="ua-phone-login-decor__blob ua-phone-login-decor__blob--4"></span>
      </div>

      <div class="ua-login-status">
        <span>09:34</span>
        <span class="ua-login-status__icons">
          <svg width="17" height="11" viewBox="0 0 17 11" fill="#111"><path d="M1 7h2v4H1V7zm4-2h2v6H5V5zm4-3h2v9H9V2zm4 5h2v4h-2V7z"/></svg>
          <svg width="16" height="12" viewBox="0 0 16 12" fill="#111"><path d="M8 2.4C10.8 2.4 13.2 3.6 15 5.6 15.2 5.8 15.5 5.8 15.7 5.6 15.9 5.4 15.9 5.1 15.7 4.9 13.6 2.6 10.9 1.2 8 1.2S2.4 2.6.3 4.9C.1 5.1.1 5.4.3 5.6.5 5.8.8 5.8 1 5.6 2.8 3.6 5.2 2.4 8 2.4zm0 3.6c1.8 0 3.4.8 4.5 2.1.2.2.5.2.7 0 .2-.2.2-.5 0-.7C11.9 5.4 10.1 4.4 8 4.4S4.1 5.4 2.8 6.9c-.2.2-.2.5 0 .7.2.2.5.2.7 0C4.6 6.8 6.2 6 8 6zm0 3c1 0 1.8.5 2.4 1.2.2.2.5.2.7 0 .2-.2.2-.5 0-.7C10.3 9.2 9.2 8.6 8 8.6S5.7 9.2 4.9 10.5c-.2.2-.2.5 0 .7.2.2.5.2.7 0 .6-.7 1.4-1.2 2.4-1.2z"/></svg>
          <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x=".5" y=".5" width="20" height="11" rx="2.5" stroke="#111" opacity=".35"/><rect x="2" y="2" width="16" height="8" rx="1.5" fill="#111"/><path d="M22 4.5v3a1.5 1.5 0 000-3z" fill="#111" opacity=".4"/></svg>
        </span>
      </div>

      <header class="ua-phone-login-nav">
        <button type="button" class="ua-phone-login-nav__back" id="uaPhoneLoginBackBtn" aria-label="返回">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 6l-6 6 6 6"/></svg>
        </button>
        <button type="button" class="ua-phone-login-nav__skip" id="uaPhoneLoginSkipBtn">跳过</button>
      </header>

      <div class="ua-phone-login-body">
        <h1 class="ua-phone-login-title">手机快速登录</h1>

        <div class="ua-phone-login-fields">
          <div class="ua-phone-login-field">
            <input type="tel" id="uaLoginPhoneInput" class="ua-phone-login-input" inputmode="tel" maxlength="11" placeholder="手机号" autocomplete="tel">
            <button type="button" class="ua-phone-login-sms" id="uaLoginSmsBtn">获取验证码</button>
          </div>
          <div class="ua-phone-login-field ua-phone-login-field--code">
            <input type="text" id="uaLoginCodeInput" class="ua-phone-login-input" inputmode="numeric" maxlength="6" placeholder="验证码" autocomplete="one-time-code">
          </div>
        </div>

        <div class="ua-phone-login-other">
          <div class="ua-login-other-methods ua-login-other-methods--in-phone">
            <p class="ua-login-other-methods__title">其他登录方式</p>
            <div class="ua-login-other-methods__row">
              <button type="button" class="ua-login-method" id="uaPhoneLoginWechatLinkBtn" aria-label="微信登录">
                <span class="ua-login-method__icon">
                  <img src="../assets/login-method-wechat.png" alt="">
                </span>
                <span class="ua-login-method__label">微信</span>
              </button>
              <button type="button" class="ua-login-method" id="uaPhoneLoginOneClickLinkBtn" aria-label="一键登录">
                <span class="ua-login-method__icon">
                  <img src="../assets/login-method-oneclick.svg" alt="">
                </span>
                <span class="ua-login-method__label">一键登录</span>
              </button>
            </div>
          </div>
        </div>

        <label class="ua-login-agree ua-phone-login-agree">
          <span class="ua-login-agree__check">
            <input type="checkbox" id="uaPhoneLoginAgree">
            <span class="ua-login-agree__box" aria-hidden="true"></span>
          </span>
          <span class="ua-login-agree__text">
            我已阅读并同意<a href="#" onclick="return false">《用户协议》</a>和<a href="#" onclick="return false">《隐私政策》</a>、<a href="#" onclick="return false">《登录政策》</a>
          </span>
        </label>
      </div>

      <button type="button" class="ua-phone-login-submit" id="uaLoginPhoneSubmitBtn">登录</button>

      <div class="ua-login-agree-modal" id="uaLoginWechatAgreeModal" hidden>
        <div class="ua-login-agree-modal__panel" role="dialog" aria-modal="true" aria-labelledby="uaPhoneLoginWechatAgreeTitle">
          <p class="ua-login-agree-modal__text" id="uaPhoneLoginWechatAgreeTitle">
            我已阅读并同意<a href="#" onclick="return false">《用户协议》</a>和<a href="#" onclick="return false">《隐私政策》</a><a href="#" onclick="return false">《登录政策》</a>
          </p>
          <div class="ua-login-agree-modal__actions">
            <button type="button" class="ua-login-agree-modal__btn ua-login-agree-modal__btn--cancel" id="uaLoginWechatAgreeCancelBtn">我再想想</button>
            <button type="button" class="ua-login-agree-modal__btn ua-login-agree-modal__btn--confirm" id="uaLoginWechatAgreeConfirmBtn">同意</button>
          </div>
        </div>
      </div>

      <div class="ua-login-toast" id="uaLoginToast" role="status" aria-live="polite"></div>
    </div>
  </div>
  <script src="../js/user-app-auth.js"></script>
</body>
</html>
