<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>申请已提交 · 门店 H5</title>
    <link rel="stylesheet" href="store-h5-common.css">
</head>
<body class="sh5 sh5-gradient">
    <header class="sh5-head">
        <div class="sh5-head-inner">
            <button type="button" class="sh5-back" onclick="history.back()" aria-label="返回">‹</button>
            <h1 class="sh5-title">门店注册</h1>
        </div>
    </header>
    <main class="sh5-main">
        <div class="sh5-card-center">
            <div class="sh5-icon-wrap sh5-icon-warn" style="background:#fff7ed;color:#ea580c;border-radius:16px;width:72px;height:72px;font-size:36px">⏱</div>
            <h2 class="sh5-h2">申请已提交</h2>
            <p class="sh5-desc">门店注册资料已提交至 BD 审核处，请等待 BD 审核。审核结果将由 BD 同步通知。</p>
            <div class="sh5-panel">
                <div class="sh5-row">
                    <span class="sh5-k">当前状态</span>
                    <span class="sh5-v"><span class="sh5-pill">待审核</span></span>
                </div>
                <div class="sh5-row">
                    <span class="sh5-k">门店名称</span>
                    <span class="sh5-v" data-sh5-sync="storeName"><span class="sh5-sync-target">示例旗舰店</span></span>
                </div>
                <div class="sh5-row">
                    <span class="sh5-k">绑定 BD</span>
                    <span class="sh5-v"><span data-sh5-sync="bdName"><span class="sh5-sync-target">张三</span></span><span class="sh5-v-sub">工号 <span data-sh5-sync="bdCode"><span class="sh5-sync-target">DEMO001</span></span></span></span>
                </div>
                <div class="sh5-row">
                    <span class="sh5-k">提交时间</span>
                    <span class="sh5-v" data-sh5-sync="submitTime"><span class="sh5-sync-target">2026-05-09 10:12</span></span>
                </div>
            </div>
        </div>
    </main>
    <footer class="sh5-foot">
        <div class="sh5-foot-inner">
            <button type="button" class="sh5-btn sh5-btn-outline" onclick="location.reload()">刷新状态</button>
            <button type="button" class="sh5-btn sh5-btn-primary sh5-btn-wide" onclick="location.href='register.html'">继续填写</button>
        </div>
    </footer>
    <script src="../../js/path-prefix.js"></script>
    <script src="store-h5-sync.js"></script>
</body>
</html>
