<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>门店进件 · 门店 H5</title>
    <link rel="stylesheet" href="store-h5-common.css">
    <style>
        .sh5-sticky-sub {
            position: sticky;
            top: calc(var(--sh5-head-h) + var(--sh5-safe-t));
            z-index: 90;
            margin: 0 -16px 12px;
        }
        .shop-head-banner {
            background: linear-gradient(135deg, #eff6ff, #fff);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .shop-head-banner strong { font-size: 17px; display: block; margin-bottom: 6px;}
        .shop-head-banner span { font-size: 13px; color: var(--sh5-muted); }
    </style>
</head>
<body class="sh5">
    <header class="sh5-head">
        <div class="sh5-head-inner">
            <button type="button" class="sh5-back" onclick="history.back()" aria-label="返回">‹</button>
            <h1 class="sh5-title">门店进件</h1>
        </div>
    </header>
    <main class="sh5-main">
        <div class="shop-head-banner">
            <strong data-sh5-sync="storeName"><span class="sh5-sync-target">XX便利店</span></strong>
            <span style="font-size:13px;color:var(--sh5-muted)" data-sh5-sync="detailAddress"><span class="sh5-sync-target">杭州市滨江区网商路 XX 号</span></span>
        </div>
        <section class="sh5-section">
            <div class="sh5-block-head"><span class="sh5-sec-icon" style="display:inline-flex;width:28px;height:28px;">👤</span> 联系人</div>
            <div class="sh5-field">
                <div class="sh5-field-hd"><span>联系人姓名</span></div>
                <input class="sh5-input" type="text" placeholder="请输入" />
            </div>
            <div class="sh5-field">
                <div class="sh5-field-hd"><span>联系人电话</span></div>
                <input class="sh5-input" type="tel" placeholder="请输入" />
            </div>
        </section>
        <div class="sh5-sticky-sub sh5-blue-strip" style="margin-left:0;margin-right:0;border-radius:0;">门店基本信息</div>
        <section class="sh5-section">
            <div class="sh5-field">
                <div class="sh5-field-hd"><span>门店类型</span></div>
                <select class="sh5-select"><option>请选择</option><option>直营</option><option>加盟</option></select>
            </div>
            <div class="sh5-field">
                <div class="sh5-field-hd"><span>经营范围</span></div>
                <select class="sh5-select"><option>请选择</option><option>预包装食品</option></select>
            </div>
        </section>
        <section class="sh5-section">
            <div class="sh5-block-head"><span class="sh5-sec-icon" style="display:inline-flex;width:28px;height:28px;">🕒</span> 营业执照信息</div>
            <div class="sh5-field">
                <div class="sh5-field-hd"><span>营业执照名称</span></div>
                <input class="sh5-input" type="text" placeholder="请输入" />
            </div>
            <div class="sh5-field">
                <div class="sh5-field-hd"><span>统一社会信用代码</span></div>
                <input class="sh5-input" type="text" placeholder="请输入" />
            </div>
            <div class="sh5-field">
                <div class="sh5-field-hd"><span>有效期</span></div>
                <input class="sh5-input" type="text" placeholder="请选择" />
            </div>
            <div class="sh5-field">
                <div class="sh5-field-hd"><span>营业状态</span></div>
                <div class="sh5-radio-row">
                    <label><input type="radio" name="bs" /> 营业中</label>
                    <label><input type="radio" name="bs" /> 休息中</label>
                </div>
            </div>
        </section>
        <section class="sh5-section">
            <div class="sh5-block-head"><span class="sh5-sec-icon" style="display:inline-flex;width:28px;height:28px;">📋</span> 资质证照</div>
            <p style="margin:0 0 12px;font-size:12px;color:var(--sh5-muted)">请上传营业执照、食品经营许可证等</p>
            <div class="sh5-field">
                <div class="sh5-field-hd"><span>营业执照</span></div>
                <div class="sh5-placeholder-area" style="min-height:88px">上传</div>
            </div>
            <div class="sh5-field">
                <div class="sh5-field-hd"><span>食品经营许可证</span></div>
                <div class="sh5-placeholder-area" style="min-height:88px">上传</div>
            </div>
            <div class="sh5-field">
                <div class="sh5-field-hd"><span>其他资质</span></div>
                <div class="sh5-placeholder-area" style="min-height:88px">上传</div>
            </div>
        </section>
        <section class="sh5-section">
            <div class="sh5-block-head"><span class="sh5-sec-icon" style="display:inline-flex;width:28px;height:28px;">📷</span> 门店照片</div>
            <div class="sh5-field">
                <div class="sh5-field-hd"><span>门头照</span></div>
                <div class="sh5-placeholder-area" style="min-height:140px">🏪</div>
            </div>
        </section>
        <section class="sh5-section">
            <div class="sh5-block-head"><span class="sh5-sec-icon" style="display:inline-flex;width:28px;height:28px;">🏦</span> 结算信息</div>
            <div class="sh5-field">
                <div class="sh5-field-hd"><span>开户支行</span><span class="sh5-hint"><a href="#" class="sh5-map-link">选择</a></span></div>
                <input class="sh5-input" type="text" placeholder="请输入或选择支行" />
            </div>
            <div class="sh5-field">
                <div class="sh5-field-hd"><span>银行账号</span></div>
                <input class="sh5-input" type="text" placeholder="请输入" />
            </div>
            <div class="sh5-field">
                <div class="sh5-field-hd"><span>开户人姓名</span></div>
                <input class="sh5-input" type="text" placeholder="请输入" />
            </div>
        </section>
        <section class="sh5-section">
            <div class="sh5-block-head"><span class="sh5-sec-icon" style="display:inline-flex;width:28px;height:28px;">📃</span> 合同信息</div>
            <div class="sh5-field">
                <div class="sh5-field-hd"><span>合同编号</span></div>
                <input class="sh5-input" type="text" placeholder="请输入" />
            </div>
            <div class="sh5-field">
                <div class="sh5-field-hd"><span>合同有效期</span></div>
                <input class="sh5-input" type="text" placeholder="请选择" />
            </div>
        </section>
        <section class="sh5-section">
            <div class="sh5-block-head">扩展信息</div>
            <div class="sh5-field"><input class="sh5-input" placeholder="扩展字段 1" /></div>
            <div class="sh5-field"><input class="sh5-input" placeholder="扩展字段 2" /></div>
            <div class="sh5-field"><input class="sh5-input" placeholder="扩展字段 3" /></div>
            <div class="sh5-field"><input class="sh5-input" placeholder="扩展字段 4" /></div>
            <div class="sh5-field"><input class="sh5-input" placeholder="扩展字段 5" /></div>
            <div class="sh5-field"><input class="sh5-input" placeholder="扩展字段 6" /></div>
            <div class="sh5-field"><input class="sh5-input" placeholder="扩展字段 7" /></div>
            <div class="sh5-field"><input class="sh5-input" placeholder="扩展字段 8" /></div>
            <div class="sh5-field"><input class="sh5-input" placeholder="扩展字段 9" /></div>
            <div class="sh5-field"><input class="sh5-input" placeholder="扩展字段 10" /></div>
        </section>
        <section class="sh5-section">
            <div class="sh5-block-head"><span class="sh5-sec-icon" style="display:inline-flex;width:28px;height:28px;">✎</span> 备注信息</div>
            <textarea class="sh5-input" placeholder="请输入备注（底部留白避免被悬浮栏遮挡）" style="min-height:120px"></textarea>
        </section>
        <p style="text-align:center;font-size:13px;color:var(--sh5-muted);padding:8px 0 12px;">‹ 已完成信息填写</p>
    </main>
    <footer class="sh5-foot">
        <div class="sh5-foot-inner">
            <button type="button" class="sh5-btn sh5-btn-outline" onclick="history.back()">取消</button>
            <button type="button" class="sh5-btn sh5-btn-primary sh5-btn-wide" onclick="location.href='store-detail-marketing.html'">下一步</button>
        </div>
    </footer>
    <script src="../../js/path-prefix.js"></script>
    <script src="store-h5-sync.js"></script>
</body>
</html>
