<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>门店注册 · 同行店 · 门店 H5</title>
    <link rel="stylesheet" href="store-h5-common.css">
</head>
<body class="sh5">
    <header class="sh5-head">
        <div class="sh5-head-inner">
            <button type="button" class="sh5-back" onclick="history.back()" aria-label="返回">‹</button>
            <h1 class="sh5-title">门店注册</h1>
        </div>
    </header>
    <main class="sh5-main">
        <div class="sh5-hero-card">
            <div class="sh5-tag-blue">扫码注册</div>
            <h2 class="sh5-hero-title">未命名门店</h2>
            <p class="sh5-hero-desc">请按实际情况填写门店注册资料，提交后将进入审核流程。</p>
        </div>
        <section class="sh5-section">
            <div class="sh5-sec-head">
                <div class="sh5-sec-icon">🏢</div>
                <div class="sh5-sec-titles"><h3>基础信息</h3><p>名称与负责 BD</p></div>
            </div>
            <div class="sh5-field">
                <div class="sh5-field-hd"><span class="sh5-req">门店主体</span><span class="sh5-hint">营业执照主体 / 实际经营主体</span></div>
                <input class="sh5-input" type="text" placeholder="请输入门店主体" data-sh5-bind="storeEntity" />
            </div>
            <div class="sh5-field">
                <div class="sh5-field-hd"><span class="sh5-req">门店名称</span><span class="sh5-hint">尽量以小区、道路或原店铺名为准</span></div>
                <input class="sh5-input" type="text" placeholder="请输入门店名称" data-sh5-bind="storeName" />
            </div>
            <div class="sh5-field">
                <div class="sh5-field-hd"><span>门店简称</span><span class="sh5-hint">对外简称，# 标签</span></div>
                <input class="sh5-input" type="text" data-sh5-bind="storeAbbrev" />
            </div>
            <div class="sh5-field">
                <div class="sh5-field-hd"><span>绑定 BD</span><span class="sh5-hint">默认当前登录账号，不可更改</span></div>
                <input class="sh5-input" type="text" readonly data-sh5-bind="bdAccount" value="DEMO001" />
            </div>
        </section>
        <section class="sh5-section">
            <div class="sh5-sec-head">
                <div class="sh5-sec-icon">📦</div>
                <div class="sh5-sec-titles"><h3>配送与分类</h3><p>配送仓库默认随绑定 BD，可手动调整；门店合作类型与设备归类</p></div>
            </div>
            <div class="sh5-field">
                <div class="sh5-field-hd"><span>配送仓库</span></div>
                <input class="sh5-input" type="text" data-sh5-bind="warehouse" />
            </div>
            <div class="sh5-field">
                <div class="sh5-field-hd"><span class="sh5-req">门店合作类型</span><span class="sh5-hint">同行店</span></div>
                <select class="sh5-select" data-sh5-bind="cooperationType"><option>加盟店</option><option>合作店</option><option selected>同行店</option></select>
            </div>
            <div class="sh5-highlight" style="background:#f3f4f6;border-radius:10px;padding:12px;font-size:13px;color:#374151;margin-bottom:14px;">
                「同行店」需提供：<strong>供货关系证明</strong>、现有系统门店编码（如有）。
            </div>
            <div class="sh5-field">
                <div class="sh5-field-hd"><span class="sh5-req">供货关系证明</span></div>
                <button type="button" class="sh5-upload">上传证明文件</button>
            </div>
            <div class="sh5-field">
                <div class="sh5-field-hd"><span>冷藏柜照片</span><span class="sh5-hint">最多 5 张</span></div>
                <button type="button" class="sh5-upload">上传冷藏柜照片</button> <span style="color:#9ca3af;font-size:13px">0/5</span>
            </div>
            <div class="sh5-field">
                <div class="sh5-field-hd"><span>冷冻柜照片</span><span class="sh5-hint">最多 5 张</span></div>
                <button type="button" class="sh5-upload">上传冷冻柜照片</button> <span style="color:#9ca3af;font-size:13px">0/5</span>
            </div>
        </section>
        <p class="sh5-foot-hint">请先选择「门店合作类型」，系统将展示对应的资料项。</p>
    </main>
    <footer class="sh5-foot">
        <div class="sh5-foot-inner">
            <button type="button" class="sh5-btn sh5-btn-outline" onclick="history.back()">取消</button>
            <button type="button" class="sh5-btn sh5-btn-primary sh5-btn-wide" onclick="StoreH5Sync.set(StoreH5Sync.collectForm());location.href='status-submitted.html'">提交申请</button>
        </div>
    </footer>
    <script src="../../js/path-prefix.js"></script>
    <script src="store-h5-sync.js"></script>
</body>
</html>
