<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>已取消 · 门店 H5</title>
    <link rel="stylesheet" href="store-h5-common.css">
</head>
<body class="sh5 sh5-gradient">
    <header class="sh5-head">
        <div class="sh5-head-inner">
            <button type="button" class="sh5-back" onclick="history.back()" aria-label="返回">‹</button>
            <h1 class="sh5-title">门店状态</h1>
        </div>
    </header>
    <main class="sh5-main">
        <div class="sh5-card-center">
            <div class="sh5-icon-wrap sh5-icon-cancel">✕</div>
            <h2 class="sh5-h2">已取消</h2>
            <p class="sh5-desc">本次填写已取消，未提交注册。如需注册请重新扫码打开链接。</p>
            <div class="sh5-panel">
                <div class="sh5-row">
                    <span class="sh5-k">当前状态</span>
                    <span class="sh5-v"><span class="sh5-pill">已取消</span></span>
                </div>
                <div class="sh5-row">
                    <span class="sh5-k">门店名称</span>
                    <span class="sh5-v">您的门店</span>
                </div>
                <div class="sh5-row">
                    <span class="sh5-k">绑定 BD</span>
                    <span class="sh5-v"><span data-sh5-sync="bdName"><span class="sh5-sync-target">张三</span></span><span class="sh5-v-sub">工号 <span data-sh5-sync="bdCode"><span class="sh5-sync-target">DEMO001</span></span></span></span>
                </div>
                <div class="sh5-row">
                    <span class="sh5-k">提交时间</span>
                    <span class="sh5-v">—</span>
                </div>
            </div>
        </div>
    </main>
    <footer class="sh5-foot">
        <div class="sh5-foot-inner">
            <button type="button" class="sh5-btn sh5-btn-outline" onclick="history.back()">关闭</button>
            <button type="button" class="sh5-btn sh5-btn-primary sh5-btn-wide" onclick="location.href='register.html'">重新注册</button>
        </div>
    </footer>
    <script src="../../js/path-prefix.js"></script>
    <script src="store-h5-sync.js"></script>
</body>
</html>
