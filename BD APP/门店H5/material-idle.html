<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>门店资料 · 门店 H5</title>
    <link rel="stylesheet" href="store-h5-common.css">
</head>
<body class="sh5 sh5-singlefoot">
    <header class="sh5-head">
        <div class="sh5-head-inner">
            <button type="button" class="sh5-back" onclick="history.back()" aria-label="返回">‹</button>
            <h1 class="sh5-title left">门店资料</h1>
        </div>
    </header>
    <main class="sh5-main">
        <section class="sh5-panel" style="background:#fafafa;margin-top:16px;">
            <div class="sh5-row" style="border:none;padding:8px 0;">
                <span class="sh5-k">门店名称</span>
                <span class="sh5-v" data-sh5-sync="storeName"><span class="sh5-sync-target">示例旗舰店</span></span>
            </div>
            <div class="sh5-row" style="border:none;">
                <span class="sh5-k">绑定 BD</span>
                <span class="sh5-v"><span data-sh5-sync="bdName"><span class="sh5-sync-target">张三</span></span><span class="sh5-v-sub">工号 <span data-sh5-sync="bdCode"><span class="sh5-sync-target">DEMO001</span></span></span></span>
            </div>
        </section>
        <div class="sh5-note" style="padding-top:28px">
            当前门店状态无需店长在此补充资料；<br />若有疑问请联系拓展 BD。
        </div>
    </main>
    <footer class="sh5-foot">
        <div class="sh5-foot-inner">
            <button type="button" class="sh5-btn sh5-btn-primary" style="flex:1;max-width:92%;margin:0 auto" onclick="location.href='index.html'">我知道了</button>
        </div>
    </footer>
    <script src="../../js/path-prefix.js"></script>
    <script src="store-h5-sync.js"></script>
</body>
</html>
