<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冷丰WMS - 负库存</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/components.css">
</head>
<body>
    <!-- 侧边栏容器 -->
    <div id="sidebar-container"></div>
    <script src="../js/path-prefix.js"></script>
    <script src="../js/wms-sidebar.js"></script>

    <!-- 顶部导航栏容器 -->
    <div id="header-container"></div>
    
    <div class="container">
        <main class="main-content">
            <div class="content-tabs">
                <button class="active">负库存</button>
            </div>
            
            <hr class="content-divider">
            
            <div class="content-title">异常管理 / 负库存</div>
            
            <section class="search-section">
                <form class="search-form">
                    <div class="form-group custom-select-wrapper">
                        <label>货主:</label>
                        <div class="custom-select">
                            <input type="text" id="searchCompany" placeholder="请选择或输入搜索">
                            <span class="select-arrow">▼</span>
                            <span class="clear-btn">×</span>
                            <div class="select-dropdown" id="searchCompanyDropdown">
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>商品:</label>
                        <div class="input-wrapper">
                            <input type="text" id="searchSkuKeyword" placeholder="请输入商品编码/条码/名称">
                            <span class="clear-btn">×</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>来源单号:</label>
                        <div class="input-wrapper">
                            <input type="text" id="searchSourceOrder" placeholder="请输入">
                            <span class="clear-btn">×</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label style="width: 70px;">储位:</label>
                        <div class="input-wrapper">
                            <input type="text" id="searchLocation" placeholder="请输入储位编码/名称">
                            <span class="clear-btn">×</span>
                        </div>
                    </div>
                    <div class="form-group custom-select-wrapper">
                        <label>状态:</label>
                        <div class="custom-select">
                            <input type="text" id="searchStatus" value="初始" placeholder="请选择">
                            <span class="select-arrow">▼</span>
                            <span class="clear-btn">×</span>
                            <div class="select-dropdown" id="searchStatusDropdown">
                                <div class="select-option" data-value="初始">初始</div>
                                <div class="select-option" data-value="已执行">已执行</div>
                            </div>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-primary" onclick="searchInventory()">查询</button>
                        <button type="button" class="btn btn-secondary" onclick="executeNegativeInventory()">执行</button>
                        <button type="button" class="btn btn-secondary">导出</button>
                    </div>
                </form>
            </section>

            <section class="table-section">
                <div class="table-scroll-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th><input type="checkbox" class="table-checkbox checkbox-all"></th>
                                <th>仓库</th>
                                <th>货主</th>
                                <th>商品编码</th>
                                <th>商品名称</th>
                                <th>待扣数量</th>
                                <th>来源单号</th>
                                <th>储位</th>
                                <th>状态</th>
                                <th>重试次数</th>
                                <th>更新时间</th>
                                <th>更新人</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- 数据将通过JavaScript动态生成 -->
                        </tbody>
                    </table>
                </div>
                
                <!-- 分页组件容器 -->
                <div id="pagination-container"></div>
            </section>
        </main>
    </div>

    <!-- 引入公共脚本 -->
    <script src="../js/common.js"></script>
    <script src="../js/pagination.js"></script>
    <script src="../js/form-utils.js"></script>
    <script src="../js/modal-manager.js"></script>
    <script src="../js/page-manager.js"></script>
    <script>
        // 模拟数据
        const inventoryData = [
            {
                warehouse: 'W001 南京仓',
                company: 'C001 货主1',
                skuCode: 'SKU001',
                skuName: '商品A',
                inventoryStatus: '正常',
                quantity: 100,
                location: 'A-01-01',
                sourceOrder: 'PO001',
                status: '初始',
                retryCount: 0,
                updateTime: '2026-02-10 10:00:00',
                updateUser: 'admin'
            },
            {
                warehouse: 'W001 南京仓',
                company: 'C002 货主2',
                skuCode: 'SKU002',
                skuName: '商品B',
                inventoryStatus: '正常',
                quantity: 200,
                location: 'B-02-03',
                sourceOrder: 'WO001',
                status: '已执行',
                retryCount: 1,
                updateTime: '2026-02-10 11:00:00',
                updateUser: 'admin'
            },
            {
                warehouse: 'W001 南京仓',
                company: 'C003 货主3',
                skuCode: 'SKU003',
                skuName: '商品C',
                inventoryStatus: '异常',
                quantity: 50,
                location: 'C-03-02',
                sourceOrder: 'RO001',
                status: '初始',
                retryCount: 3,
                updateTime: '2026-02-10 12:00:00',
                updateUser: 'admin'
            }
        ];

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            try {
                // 初始化下拉框数据
                const companyDropdown = document.getElementById('searchCompanyDropdown');
                const companies = ['C001 货主1', 'C002 货主2', 'C003 货主3', 'C004 货主4', 'C005 货主5'];
                companies.forEach(company => {
                    const option = document.createElement('div');
                    option.className = 'select-option';
                    option.setAttribute('data-value', company);
                    option.textContent = company;
                    companyDropdown.appendChild(option);
                });

                // 加载库存数据
                function loadInventoryData(data = inventoryData) {
                    const tbody = document.querySelector('#tableBody');
                    tbody.innerHTML = '';
                    
                    data.forEach((item) => {
                        const dataIndex = inventoryData.findIndex(d =>
                            d.skuCode === item.skuCode &&
                            d.sourceOrder === item.sourceOrder &&
                            d.location === item.location
                        );
                        const row = document.createElement('tr');
                        if (dataIndex >= 0) {
                            row.dataset.index = String(dataIndex);
                        }
                        row.innerHTML = `
                            <td><input type="checkbox" class="table-checkbox checkbox-row"></td>
                            <td>${item.warehouse}</td>
                            <td>${item.company}</td>
                            <td>${item.skuCode}</td>
                            <td>${item.skuName}</td>
                            <td>${item.quantity}</td>
                            <td>${item.sourceOrder}</td>
                            <td>${item.location}</td>
                            <td>${item.status}</td>
                            <td>${item.retryCount}</td>
                            <td>${item.updateTime}</td>
                            <td>${item.updateUser}</td>
                        `;
                        tbody.appendChild(row);
                    });
                }

                // 搜索库存
                window.searchInventory = function searchInventory() {
                    const filters = {
                        company: document.getElementById('searchCompany').value.trim(),
                        skuKeyword: document.getElementById('searchSkuKeyword').value.trim(),
                        sourceOrder: document.getElementById('searchSourceOrder').value.trim(),
                        location: document.getElementById('searchLocation').value.trim(),
                        status: document.getElementById('searchStatus').value.trim()
                    };

                    const result = inventoryData.filter(item => {
                        const skuMatch = !filters.skuKeyword ||
                            item.skuCode.includes(filters.skuKeyword) ||
                            item.skuName.includes(filters.skuKeyword);
                        return (!filters.company || item.company === filters.company) &&
                            skuMatch &&
                            (!filters.sourceOrder || item.sourceOrder.includes(filters.sourceOrder)) &&
                            (!filters.location || item.location.includes(filters.location)) &&
                            (!filters.status || item.status === filters.status);
                    });

                    loadInventoryData(result);
                };

                window.executeNegativeInventory = function executeNegativeInventory() {
                    const checked = document.querySelectorAll('#tableBody .checkbox-row:checked');
                    if (!checked.length) {
                        if (typeof showToast === 'function') {
                            showToast('请选择要执行的记录');
                        }
                        return;
                    }

                    const indices = [];
                    let hasNonInitial = false;
                    checked.forEach(checkbox => {
                        const row = checkbox.closest('tr');
                        const index = Number(row?.dataset.index);
                        if (!Number.isFinite(index) || index < 0) return;
                        if (inventoryData[index].status !== '初始') {
                            hasNonInitial = true;
                            return;
                        }
                        indices.push(index);
                    });

                    if (hasNonInitial) {
                        if (typeof showToast === 'function') {
                            showToast('仅状态为「初始」的记录可执行');
                        }
                        return;
                    }
                    if (!indices.length) {
                        if (typeof showToast === 'function') {
                            showToast('请选择要执行的记录');
                        }
                        return;
                    }

                    const now = '2026-05-28 12:00:00';
                    indices.forEach(index => {
                        const item = inventoryData[index];
                        item.status = '已执行';
                        item.retryCount = (item.retryCount || 0) + 1;
                        item.updateTime = now;
                        item.updateUser = 'admin';
                    });

                    if (typeof clearAllCheckboxes === 'function') {
                        clearAllCheckboxes();
                    }
                    if (typeof showToast === 'function') {
                        showToast(`已执行 ${indices.length} 条记录`);
                    }
                    searchInventory();
                };

                // 使用PageManager简化页面逻辑
                const page = new PageManager({
                    entityName: '负库存',
                    
                    // 搜索区域下拉框
                    customSelects: [
                        { inputId: 'searchCompany', dropdownId: 'searchCompanyDropdown' },
                        { inputId: 'searchStatus', dropdownId: 'searchStatusDropdown' }
                    ],
                    
                    deleteModal: {
                        modalId: 'confirmDeleteModal',
                        closeBtnId: 'confirmDeleteCloseBtn',
                        cancelBtnId: 'cancelDeleteBtn',
                        confirmBtnId: 'confirmDeleteBtn'
                    }
                });
                
                page.init();

                // 默认按「初始」状态查询
                document.getElementById('searchStatus').value = '初始';
                searchInventory();
            } catch (error) {
                console.error('初始化错误:', error);
                // 避免showToast可能不存在的问题
                if (typeof showToast === 'function') {
                    showToast('页面初始化失败，请刷新重试', 'error');
                }
            }
        });
    </script>
</body>
</html>
