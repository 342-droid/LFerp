    <style>
        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            border: 1px solid transparent;
        }
        /* 发货单状态：各状态独立配色 */
        .dist-st-initial { background-color: #fafafa; color: #595959; border-color: #d9d9d9; }
        .dist-st-review-start { background-color: #e6f4ff; color: #1677ff; border-color: #91caff; }
        .dist-st-review-done { background-color: #e6fffb; color: #08979c; border-color: #87e8de; }
        .dist-st-load-start { background-color: #fffbe6; color: #d48806; border-color: #ffd591; }
        .dist-st-load-done { background-color: #fff7e6; color: #d46b08; border-color: #ffc069; }
        .dist-st-ship-start { background-color: #f9f0ff; color: #722ed1; border-color: #d3adf7; }
        .dist-st-ship-done { background-color: #f6ffed; color: #389e0d; border-color: #95de64; }
        .dist-st-canceled { background-color: #fff1f0; color: #cf1322; border-color: #ffa39e; }
        .dist-st-default { background-color: #f0f0f0; color: #434343; border-color: #d9d9d9; }
        /* 包裹状态（详情子表） */
        .status-initial { background-color: #e6f7ff; color: #1890ff; border-color: #91d5ff; }
        .status-progress { background-color: #fff7e6; color: #fa8c16; border-color: #ffd591; }
        .status-complete { background-color: #f6ffed; color: #52c41a; border-color: #b7eb8f; }
        .status-canceled { background-color: #fff1f0; color: #f5222d; border-color: #ffa39e; }

        .distribution-no-link {
            color: #2196f3;
            text-decoration: none;
            font-weight: 600;
        }
        .distribution-no-link:hover {
            color: #1976d2;
            text-decoration: underline;
        }

        .modal-form {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }
        .modal-form-group {
            width: calc(33.33% - 10px);
        }
        .modal-form-group label {
            width: 120px;
            display: inline-block;
            margin-right: 8px;
            color: #666;
            font-weight: 600;
        }
        .modal-form-group input,
        .modal-form-group textarea {
            width: calc(100% - 132px);
            padding: 6px 10px;
            border: 1px solid #ddd;
            border-radius: 3px;
            color: #333;
            outline: none;
            box-sizing: border-box;
        }
        .modal-form-group textarea {
            min-height: 56px;
            resize: vertical;
            vertical-align: top;
        }
        .loading {
            text-align: center;
            padding: 30px;
            color: #666;
        }
    </style>

            const rnd = String(Math.floor(Math.random() * 100)).padStart(2, '0');
            return `FH${ts}${rnd}`;
        }

        function getDistributionStatusClass(status) {
            if (!status) return 'dist-st-default';
            return distributionStatusBadgeClass[status] || 'dist-st-default';
        }

        function getCartonStatusClass(status) {
            if (status === '初始') return 'status-initial';
            if (status === '开始复核' || status === '复核完成') return 'status-progress';
            if (status === '装载完成' || status === '发货完成') return 'status-complete';
            if (status === '已取消') return 'status-canceled';
            return 'status-progress';
        }

        /** 按挂载包裹的目的仓库、站点编码/名称筛选（同一包裹需同时满足已填条件） */
        function matchesCartonSearch(item, targetWarehouse, siteCode) {
            if (!targetWarehouse && !siteCode) return true;
            const cartons = item.cartons || [];
            return cartons.some(c => {
                const okTw = !targetWarehouse || (c.targetWarehouse && c.targetWarehouse.includes(targetWarehouse));
                const okSc = !siteCode ||
                    (c.siteCode && c.siteCode.includes(siteCode)) ||
                    (c.siteName && c.siteName.includes(siteCode));
                return okTw && okSc;
            });
        }

        function formatSiteDisplay(code, name) {
            const c = String(code == null ? '' : code).trim();
            const n = String(name == null ? '' : name).trim();
            if (c && n) return `${c}-${n}`;
            return c || n;
        }

        function escapeHtml(value) {
            return String(value == null ? '' : value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function getSelectedDistributions() {
            const checkedRows = Array.from(document.querySelectorAll('#tableBody .checkbox-row:checked'));
            return checkedRows
                .map(cb => cb.closest('tr'))
                .map(tr => tr ? tr.getAttribute('data-distribution-no') : '')
                .filter(Boolean)
                .map(distributionNo => distributionMockData.find(item => item.distributionNo === distributionNo))
                .filter(Boolean);
        }

        function toNumber(value) {
            const n = Number(value);
            return Number.isFinite(n) ? n : 0;
        }

        function resolvePlannedQty(line) {
            const keys = ['qty', 'planQty', 'allocateQty', 'allocatedQty', 'cartonQty', 'recheckQty'];
            for (const key of keys) {
                if (line[key] != null && line[key] !== '') return toNumber(line[key]);
            }
            return 0;
        }

        function resolveActualQty(line, fallbackQty) {
            const keys = ['actualQty', 'shippedQty', 'loadedQty', 'reviewedQty', 'sortedQty', 'pickedQty', 'recheckQty', 'cartonQty'];
            for (const key of keys) {
                if (line[key] != null && line[key] !== '') return toNumber(line[key]);
            }
            return fallbackQty;
        }

        function getProductName(line) {
            return (line.skuName || line.productName || line.goodsName || '').trim();
        }

        function addLineToBucket(bucket, outboundNo, productName, qty, actualQty) {
            const cleanName = String(productName || '').trim();
            if (!cleanName) return;
            const cleanOutboundNo = String(outboundNo || '').trim();
            const key = `${cleanOutboundNo}__${cleanName}`;
            const prev = bucket.get(key) || { outboundNo: cleanOutboundNo, productName: cleanName, qty: 0, actualQty: 0 };
            prev.qty += toNumber(qty);
            prev.actualQty += toNumber(actualQty);
            bucket.set(key, prev);
        }

        function collectLinesFromArray(bucket, lines, defaultOutboundNo) {
            if (!Array.isArray(lines)) return;
            lines.forEach(line => {
                const productName = getProductName(line);
                if (!productName) return;
                const qty = resolvePlannedQty(line);
                const actualQty = resolveActualQty(line, qty);
                const outboundNo = line.outboundNo || line.outboundOrderNo || line.orderNo || defaultOutboundNo || '';
                addLineToBucket(bucket, outboundNo, productName, qty, actualQty);
            });
        }

        function buildPrintLineItems(row) {
            const bucket = new Map();
            const cartons = row.cartons || [];

            collectLinesFromArray(bucket, row.products, row.distributionNo);
            collectLinesFromArray(bucket, row.details, row.distributionNo);
            collectLinesFromArray(bucket, row.lines, row.distributionNo);

            cartons.forEach(carton => {
                const outboundNo = carton.outboundOrderNos || '';
                collectLinesFromArray(bucket, carton.details, outboundNo);
                collectLinesFromArray(bucket, carton.lines, outboundNo);
                collectLinesFromArray(bucket, carton.products, outboundNo);
                collectLinesFromArray(bucket, carton.items, outboundNo);
            });

            const outboundNos = [...new Set(cartons.map(c => (c.outboundOrderNos || '').trim()).filter(Boolean))];
            outboundNos.forEach(outboundNo => {
                const hasCurrentOutboundLines = Array.from(bucket.values()).some(line => line.outboundNo === outboundNo);
                if (hasCurrentOutboundLines) return;
                collectLinesFromArray(bucket, outboundProductSnapshot[outboundNo], outboundNo);
            });

            if (bucket.size) {
                return Array.from(bucket.values())
                    .sort((a, b) => `${a.outboundNo}${a.productName}`.localeCompare(`${b.outboundNo}${b.productName}`, 'zh-CN'));
            }

            if (!cartons.length) {
                return [{
                    outboundNo: row.distributionNo || '',
                    productName: '发货包裹',
                    qty: row.cartonCount || 0,
                    actualQty: row.cartonCount || 0
                }];
            }

            return cartons.map(carton => ({
                outboundNo: carton.outboundOrderNos || '',
                productName: carton.cartonNo ? `包裹(${carton.cartonNo})` : '发货包裹',
                qty: 1,
                actualQty: 1
            }));
        }

        function getInboundLocation(row) {
            const cartons = row.cartons || [];
            const values = [...new Set(cartons.map(c => (c.targetWarehouse || '').trim()).filter(Boolean))];
            return values.join(' / ');
        }

        function formatPrintDateText(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}年${m}月${d}日`;
        }

        function formatYmdCn(text) {
            const raw = String(text || '').trim();
            if (!raw) return '';
            const match = raw.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
            if (!match) return raw;
            const y = Number(match[1]);
            const m = Number(match[2]);
            const d = Number(match[3]);
            return `${y}年${m}月${d}日`;
        }

        function formatQtyForPrint(value) {
            const n = toNumber(value);
            if (!Number.isFinite(n)) return '0';
            if (Number.isInteger(n)) return String(n);
            return String(Math.round(n * 1000) / 1000).replace(/\.?0+$/, '');
        }

        function getCode128Sequence(code) {
            const text = String(code || '');
            if (!text) return null;
            const values = [];
            for (const ch of text) {
                const cc = ch.charCodeAt(0);
                if (cc < 32 || cc > 126) return null;
                values.push(cc - 32);
            }
            let checksum = 104;
            values.forEach((v, idx) => { checksum += v * (idx + 1); });
            checksum = checksum % 103;
            return [104, ...values, checksum, 106];
        }

        function drawCode128ToCanvas(canvas, code) {
            const seq = getCode128Sequence(code);
            if (!seq || !canvas) return;
            const patterns = seq.map(v => code128Patterns[v]).filter(Boolean);
            const moduleWidth = 2;
            const quietZoneModules = 10;
            const totalModules = patterns.reduce((sum, p) => sum + p.split('').reduce((s, n) => s + Number(n), 0), 0);
            const width = (totalModules + quietZoneModules * 2) * moduleWidth;
            const height = 56;
            canvas.width = width;
            canvas.height = height;
            canvas.style.width = `${width}px`;
            canvas.style.height = `${height}px`;

            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, width, height);
            ctx.fillStyle = '#000';

            let x = quietZoneModules * moduleWidth;
            patterns.forEach(pattern => {
                for (let i = 0; i < pattern.length; i++) {
                    const w = Number(pattern[i]) * moduleWidth;
                    if (i % 2 === 0) {
                        ctx.fillRect(x, 0, w, height);
                    }
                    x += w;
                }
            });
        }

        function renderBarcodesInPrintDocument(doc) {
            const canvases = doc.querySelectorAll('.barcode-canvas');
            canvases.forEach(canvas => {
                drawCode128ToCanvas(canvas, canvas.getAttribute('data-code') || '');
            });
        }

        function buildPrintDocument(selectedRows) {
            const now = new Date();
            const printDate = formatPrintDateText(now);
            return `
                <!DOCTYPE html>
                <html lang="zh-CN">
                <head>
                    <meta charset="UTF-8">
                    <title></title>
                    <style>
                        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
                        @page { size: A4; margin: 12mm 14mm; }
                        body {
                            margin: 0;
                            font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
                            font-size: 13px;
                            color: #1a1a1a;
                            background: #fff;
                        }
                        .print-sheet {
                            width: 100%;
                            page-break-after: always;
                            padding: 2mm 0;
                        }
                        .print-sheet:last-child { page-break-after: auto; }
                        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
                        .center { text-align: center; }
                        .doc-header {
                            display: grid;
                            grid-template-columns: 180px 1fr auto;
                            align-items: start;
                            margin-bottom: 16px;
                            gap: 12px;
                        }
                        .barcode-wrap {
                            display: flex;
                            flex-direction: column;
                            align-items: center;
                            gap: 4px;
                        }
                        .barcode-canvas {
                            width: 170px;
                            height: 52px;
                            max-width: 170px;
                            max-height: 52px;
                        }
                        .barcode-text {
                            font-size: 11px;
                            color: #1a1a1a;
                            letter-spacing: 0.5px;
                            line-height: 1;
                        }
                        .doc-title {
                            text-align: center;
                            padding-top: 4px;
                        }
                        .doc-title h1 {
                            font-size: 30px;
                            font-weight: 700;
                            color: #1a1a1a;
                            letter-spacing: 6px;
                        }
                        .print-meta {
                            text-align: right;
                            font-size: 12px;
                            color: #374151;
                            line-height: 1.9;
                            padding-top: 2px;
                            white-space: nowrap;
                        }
                        .print-meta span {
                            color: #1259C3;
                            font-weight: 600;
                        }
                        .info-section {
                            border: 1px solid #1259C3;
                            border-radius: 2px;
                            margin-bottom: 10px;
                        }
                        .info-row {
                            display: grid;
                            grid-template-columns: repeat(3, 1fr);
                            border-bottom: 1px solid #dde3ef;
                        }
                        .info-row:last-child { border-bottom: none; }
                        .info-cell {
                            display: flex;
                            align-items: baseline;
                            padding: 6px 10px;
                            border-right: 1px solid #dde3ef;
                            font-size: 12.5px;
                            min-width: 0;
                        }
                        .info-cell:last-child { border-right: none; }
                        .info-row-full {
                            display: flex;
                            align-items: baseline;
                            padding: 6px 10px;
                            border-bottom: 1px solid #dde3ef;
                            font-size: 12.5px;
                        }
                        .info-row-full:last-child { border-bottom: none; }
                        .info-label {
                            color: #1259C3;
                            font-weight: 600;
                            white-space: nowrap;
                            margin-right: 4px;
                            flex-shrink: 0;
                        }
                        .info-value { color: #1a1a1a; }
                        .inbound-address-cell .info-value {
                            white-space: normal;
                            word-break: normal;
                            overflow-wrap: break-word;
                        }
                        .goods-table {
                            width: 100%;
                            border-collapse: collapse;
                            margin-bottom: 20px;
                            font-size: 12.5px;
                        }
                        .goods-table th {
                            background: #1259C3;
                            color: #fff;
                            font-weight: 600;
                            padding: 7px 10px;
                            text-align: center;
                            border: 1px solid #0e47a1;
                        }
                        .goods-table td {
                            padding: 7px 10px;
                            text-align: center;
                            border: 1px solid #dde3ef;
                            color: #1a1a1a;
                        }
                        .goods-table td.text-left { text-align: left; }
                        .goods-table tbody tr:nth-child(even) { background: #f5f7fc; }
                        .goods-table .empty-row td {
                            height: 30px;
                            background: #fff;
                        }
                        .goods-table .summary-row td {
                            font-weight: 600;
                            background: #f0f4fb;
                            border-top: 2px solid #1259C3;
                        }
                        .sign-section {
                            display: grid;
                            grid-template-columns: repeat(3, 1fr);
                            gap: 0;
                            margin-top: 10px;
                            padding-top: 10px;
                            border-top: 1px dashed #cdd3e0;
                        }
                        .sign-item {
                            display: flex;
                            align-items: flex-end;
                            gap: 8px;
                            padding: 0 8px;
                        }
                        .sign-item:not(:last-child) {
                            border-right: 1px dashed #cdd3e0;
                        }
                        .sign-label {
                            color: #1259C3;
                            font-weight: 600;
                            font-size: 13px;
                            white-space: nowrap;
                            flex-shrink: 0;
                        }
                        .sign-line {
                            flex: 1;
                            border-bottom: 1px solid #1a1a1a;
                            min-width: 80px;
                            height: 22px;
                        }
                        .remarks-section {
                            margin-top: 12px;
                            padding: 8px 10px;
                            border: 1px dashed #cdd3e0;
                            border-radius: 2px;
                            min-height: 48px;
                        }
                        .remarks-label {
                            color: #1259C3;
                            font-weight: 600;
                            font-size: 12.5px;
                            margin-bottom: 4px;
                        }
                        .remarks-content {
                            font-size: 12px;
                            color: #555;
                            line-height: 1.6;
                        }
                        .doc-footer {
                            margin-top: 16px;
                            display: flex;
                            justify-content: space-between;
                            font-size: 11px;
                            color: #9ca3af;
                        }
                    </style>
                </head>
                <body>
                    ${selectedRows.map((row, idx) => {
                        const nextPrintCount = (Number(row.handoverPrintCount) || 0) + 1;
                        const lines = buildPrintLineItems(row);
                        const inboundLocation = getInboundLocation(row);
                        const totalQty = lines.reduce((sum, line) => sum + toNumber(line.qty), 0);
                        const totalActualQty = lines.reduce((sum, line) => sum + toNumber(line.actualQty), 0);
                        const minDisplayRows = 5;
                        const blankRowCount = Math.max(0, minDisplayRows - lines.length);
                        const totalPages = selectedRows.length;
                        const pageNo = idx + 1;
                        return `
                            <section class="print-sheet">
                                <div class="doc-header">
                                    <div class="barcode-wrap">
                                        <canvas class="barcode-canvas" data-code="${escapeHtml(row.distributionNo || '')}"></canvas>
                                        <div class="barcode-text">${escapeHtml(row.distributionNo || '')}</div>
                                    </div>
                                    <div class="doc-title"><h1>发 货 单</h1></div>
                                    <div class="print-meta">
                                        <div>打印日期：<span>${escapeHtml(printDate)}</span></div>
                                        <div>打印次数：<span>${escapeHtml(nextPrintCount)}</span></div>
                                    </div>
                                </div>

                                <div class="info-section">
                                    <div class="info-row">
                                        <div class="info-cell"><span class="info-label">发货单号：</span><span class="info-value">${escapeHtml(row.distributionNo || '')}</span></div>
                                        <div class="info-cell"><span class="info-label">车牌号：</span><span class="info-value">${escapeHtml(row.plateNumber || '')}</span></div>
                                        <div class="info-cell"><span class="info-label">发货日期：</span><span class="info-value">${escapeHtml(formatYmdCn(row.shipTime || ''))}</span></div>
                                    </div>
                                    <div class="info-row">
                                        <div class="info-cell"><span class="info-label">出库地：</span><span class="info-value">${escapeHtml(row.warehouse || '')}</span></div>
                                        <div class="info-cell"><span class="info-label">入库地：</span><span class="info-value">${escapeHtml(inboundLocation)}</span></div>
                                        <div class="info-cell"><span class="info-label">联系电话：</span><span class="info-value">${escapeHtml(row.contactPhone || '')}</span></div>
                                    </div>
                                    <div class="info-row-full inbound-address-cell">
                                        <span class="info-label">入库地址：</span><span class="info-value">${escapeHtml(row.inboundAddress || getInboundLocation(row) || '')}</span>
                                    </div>
                                </div>

                                <table class="goods-table">
                                    <thead>
                                        <tr>
                                            <th style="width:52px;">序号</th>
                                            <th style="width:160px;">出库单号</th>
                                            <th>商品名称</th>
                                            <th style="width:80px;">数量</th>
                                            <th style="width:110px;">实际配送数量</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                    ${lines.map((line, idx) => `
                                        <tr>
                                            <td class="center">${idx + 1}</td>
                                            <td>${escapeHtml(line.outboundNo || '')}</td>
                                            <td class="text-left">${escapeHtml(line.productName || '')}</td>
                                            <td class="center">${escapeHtml(formatQtyForPrint(line.qty))}</td>
                                            <td class="center">${escapeHtml(formatQtyForPrint(line.actualQty))}</td>
                                        </tr>
                                    `).join('')}
                                    ${Array.from({ length: blankRowCount }).map(() => `
                                        <tr class="empty-row">
                                            <td colspan="5"></td>
                                        </tr>
                                    `).join('')}
                                    <tr class="summary-row">
                                        <td colspan="3" style="text-align:right;">合计：</td>
                                        <td class="center">${escapeHtml(formatQtyForPrint(totalQty))}</td>
                                        <td class="center">${escapeHtml(formatQtyForPrint(totalActualQty))}</td>
                                    </tr>
                                    </tbody>
                                </table>

                                <div class="sign-section">
                                    <div class="sign-item"><span class="sign-label">配送人：</span><div class="sign-line"></div></div>
                                    <div class="sign-item"><span class="sign-label">签收人：</span><div class="sign-line"></div></div>
                                    <div class="sign-item"><span class="sign-label">签收时间：</span><div class="sign-line"></div></div>
                                </div>

                                <div class="remarks-section">
                                    <div class="remarks-label">备注：</div>
                                    <div class="remarks-content"></div>
                                </div>
                                <div class="doc-footer">
                                    <span>此单据为正式发货凭证，请妥善保管</span>
                                    <span>第 ${pageNo} 页 / 共 ${totalPages} 页</span>
                                </div>
                            </section>
                        `;
                    }).join('')}
                </body>
                </html>
            `;
        }

        function printSelectedDistributions() {
            const selectedRows = getSelectedDistributions();
            if (!selectedRows.length) {
                if (typeof showToast === 'function') {
                    showToast('请至少勾选一条发货单再打印', 'error');
                } else {
                    alert('请至少勾选一条发货单再打印');
                }
                return;
            }

            const printWindow = window.open('', '_blank');
            if (!printWindow) {
                if (typeof showToast === 'function') {
                    showToast('浏览器拦截了打印窗口，请允许弹窗后重试', 'error');
                } else {
                    alert('浏览器拦截了打印窗口，请允许弹窗后重试');
                }
                return;
            }

            printWindow.document.open();
            printWindow.document.write(buildPrintDocument(selectedRows));
            printWindow.document.close();

            const triggerPrint = () => {
                renderBarcodesInPrintDocument(printWindow.document);
                setTimeout(() => {
                    printWindow.focus();
                    printWindow.print();
                }, 80);
            };
            if (printWindow.document.readyState === 'complete') {
                triggerPrint();
            } else {
                printWindow.addEventListener('load', triggerPrint, { once: true });
            }
            printWindow.onafterprint = () => printWindow.close();

            selectedRows.forEach(row => {
                row.handoverPrintCount = (Number(row.handoverPrintCount) || 0) + 1;
                row.updateTime = `${new Date().toISOString().slice(0, 19).replace('T', ' ')}`;
            });
            renderTable(filteredDistributionData);
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            data.forEach(item => {
                const row = document.createElement('tr');
                row.setAttribute('data-distribution-no', item.distributionNo || '');
                row.innerHTML = `
                    <td><input type="checkbox" class="table-checkbox checkbox-row"></td>
                    <td><a href="#" class="distribution-no-link" data-distribution-no="${item.distributionNo}">${item.distributionNo}</a></td>
                    <td><span class="status-badge ${getDistributionStatusClass(item.status)}">${item.status}</span></td>
                    <td>${item.warehouse}</td>
                    <td>${item.carrier}</td>
                    <td>${item.plateNumber || ''}</td>
                    <td>${item.driver || ''}</td>
                    <td>${item.volume || ''}</td>
                    <td>${item.weight || ''}</td>
                    <td>${item.cartonCount != null ? item.cartonCount : (item.cartons || []).length}</td>
                    <td>${item.loadTime || ''}</td>
                    <td>${item.shipTime || ''}</td>
                    <td>${item.handoverPrintCount != null ? item.handoverPrintCount : ''}</td>
                    <td>${item.remark || ''}</td>
                    <td>${item.createTime}</td>
                    <td>${item.createUser}</td>
                    <td>${item.updateTime}</td>
                    <td>${item.updateUser}</td>
                `;
                tbody.appendChild(row);
            });
            bindDetailEvents();
        }

        function bindDetailEvents() {
            document.querySelectorAll('.distribution-no-link').forEach(link => {
                link.addEventListener('click', e => {
                    e.preventDefault();
                    const no = link.getAttribute('data-distribution-no');
                    showDistributionDetail(no);
                });
            });
        }

        function fillDetail(row) {
            document.getElementById('detailWarehouse').value = row.warehouse || '';
            document.getElementById('detailDistributionNo').value = row.distributionNo || '';
            document.getElementById('detailStatus').value = row.status || '';
            document.getElementById('detailCarrier').value = row.carrier || '';
            document.getElementById('detailPlateNumber').value = row.plateNumber || '';
            document.getElementById('detailDriver').value = row.driver || '';
            document.getElementById('detailVolume').value = row.volume || '';
            document.getElementById('detailWeight').value = row.weight || '';
            document.getElementById('detailCartonCount').value = row.cartonCount != null ? String(row.cartonCount) : String((row.cartons || []).length);
            document.getElementById('detailLoadTime').value = row.loadTime || '';
            document.getElementById('detailShipTime').value = row.shipTime || '';
            document.getElementById('detailHandoverPrintCount').value = row.handoverPrintCount != null ? String(row.handoverPrintCount) : '';
            document.getElementById('detailCreateTime').value = row.createTime || '';
            document.getElementById('detailCreateUser').value = row.createUser || '';
            document.getElementById('detailUpdateTime').value = row.updateTime || '';
            document.getElementById('detailUpdateUser').value = row.updateUser || '';
            document.getElementById('detailRemark').value = row.remark || '';

            const tbody = document.querySelector('#detailCartonTable tbody');
            tbody.innerHTML = '';
            (row.cartons || []).forEach(c => {
                const tr = document.createElement('tr');
                const st = c.cartonStatus || '';
                tr.innerHTML = `
                    <td>${c.cartonNo || ''}</td>
                    <td>${st ? `<span class="status-badge ${getCartonStatusClass(st)}">${st}</span>` : ''}</td>
                    <td>${c.company || ''}</td>
                    <td>${c.outboundOrderNos || ''}</td>
                    <td>${c.targetWarehouse || ''}</td>
                    <td>${formatSiteDisplay(c.siteCode, c.siteName)}</td>
                    <td>${c.weight ?? ''}</td>
                    <td>${c.volume ?? ''}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function showDistributionDetail(distributionNo) {
            const modal = document.getElementById('distributionDetailModal');
            const loading = document.getElementById('distributionDetailLoading');
            const content = document.getElementById('distributionDetailContent');
            const row = distributionMockData.find(item => item.distributionNo === distributionNo) || {};

            loading.style.display = 'block';
            content.style.display = 'none';
            modal.style.display = 'block';

            setTimeout(() => {
                fillDetail(row);
                loading.style.display = 'none';
                content.style.display = 'block';
            }, 200);
        }

        function searchDistributions() {
            const filters = {
                distributionNo: document.getElementById('searchDistributionNo').value.trim(),
                status: document.getElementById('searchStatus').value.trim(),
                carrier: document.getElementById('searchCarrier').value.trim(),
                plateNumber: document.getElementById('searchPlateNumber').value.trim(),
                driver: document.getElementById('searchDriver').value.trim(),
                createStart: document.getElementById('searchCreateTimeStart').value.trim(),
                createEnd: document.getElementById('searchCreateTimeEnd').value.trim(),
                shipStart: document.getElementById('searchShipTimeStart').value.trim(),
                shipEnd: document.getElementById('searchShipTimeEnd').value.trim(),
                targetWarehouse: document.getElementById('searchTargetWarehouse').value.trim(),
                siteCode: document.getElementById('searchSiteCode').value.trim()
            };

            filteredDistributionData = distributionMockData.filter(item => {
                const createDate = item.createTime ? item.createTime.slice(0, 10) : '';
                const shipDate = item.shipTime ? item.shipTime.slice(0, 10) : '';
                return (!filters.distributionNo || item.distributionNo.includes(filters.distributionNo)) &&
                    (!filters.status || item.status === filters.status) &&
                    (!filters.carrier || item.carrier === filters.carrier) &&
                    (!filters.plateNumber || (item.plateNumber && item.plateNumber.includes(filters.plateNumber))) &&
                    (!filters.driver || (item.driver && item.driver.includes(filters.driver))) &&
                    matchesCartonSearch(item, filters.targetWarehouse, filters.siteCode) &&
                    (!filters.createStart || (createDate && createDate >= filters.createStart)) &&
                    (!filters.createEnd || (createDate && createDate <= filters.createEnd)) &&
                    (!filters.shipStart || (shipDate && shipDate >= filters.shipStart)) &&
                    (!filters.shipEnd || (shipDate && shipDate <= filters.shipEnd));
            });

            renderTable(filteredDistributionData);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const page = new PageManager({
                entityName: '发货单',
                customSelects: [
                    { inputId: 'searchStatus', dropdownId: 'searchStatusDropdown' },
                    { inputId: 'searchCarrier', dropdownId: 'searchCarrierDropdown' }
                ],
                fields: [],
                addModal: {},
                editModal: {},
                deleteModal: {}
            });
            page.init();

            renderTable(filteredDistributionData);
            document.getElementById('searchBtn').addEventListener('click', searchDistributions);
            document.getElementById('printBtn').addEventListener('click', printSelectedDistributions);

            const modal = document.getElementById('distributionDetailModal');
            document.getElementById('closeDetailModal').addEventListener('click', () => { modal.style.display = 'none'; });
            document.getElementById('detailCloseBtn').addEventListener('click', () => { modal.style.display = 'none'; });
            window.addEventListener('click', e => {
                if (e.target === modal) {
                    modal.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
