<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冷丰WMS - 库存查询</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/components.css">
</head>
<body>
    <!-- 侧边栏容器 -->
    <div id="sidebar-container"></div>
    <script src="../js/path-prefix.js"></script>
    <script src="../js/wms-sidebar.js"></script>

    <!-- 顶部导航栏容器 -->
    <div id="header-container"></div>
    
    <div class="container">
        <main class="main-content">
            <div class="content-tabs">
                <button class="active">库存查询</button>
            </div>
            
            <hr class="content-divider">
            
            <div class="content-title">库存管理 / 库存查询</div>
            
            <section class="search-section">
                <form class="search-form">
                    <div class="form-group custom-select-wrapper">
                        <label>货主:</label>
                        <div class="custom-select">
                            <input type="text" id="searchCompany" placeholder="请选择或输入搜索">
                            <span class="select-arrow">▼</span>
                            <span class="clear-btn">×</span>
                            <div class="select-dropdown" id="searchCompanyDropdown">
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>商品编码:</label>
                        <div class="input-wrapper">
                            <input type="text" id="searchSkuCode" placeholder="请输入">
                            <span class="clear-btn">×</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>商品名称:</label>
                        <div class="input-wrapper">
                            <input type="text" id="searchSkuName" placeholder="请输入">
                            <span class="clear-btn">×</span>
                        </div>
                    </div>
                    <div class="form-group custom-select-wrapper">
                        <label>来源类型:</label>
                        <div class="custom-select">
                            <input type="text" id="searchSourceType" placeholder="请选择">
                            <span class="select-arrow">▼</span>
                            <span class="clear-btn">×</span>
                            <div class="select-dropdown" id="searchSourceTypeDropdown">
                                <div class="select-option" data-value="receive">收货</div>
                                <div class="select-option" data-value="putaway">上架</div>
                                <div class="select-option" data-value="replenish">补货</div>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>来源单号:</label>
                        <div class="input-wrapper">
                            <input type="text" id="searchSourceOrder" placeholder="请输入">
                            <span class="clear-btn">×</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>储位:</label>
                        <div class="input-wrapper">
                            <input type="text" id="searchLocation" placeholder="请输入">
                            <span class="clear-btn">×</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>容器:</label>
                        <div class="input-wrapper">
                            <input type="text" id="searchLpn" placeholder="请输入">
                            <span class="clear-btn">×</span>
                        </div>
                    </div>
                    <div class="form-group custom-select-wrapper">
                        <label>是否冻结:</label>
                        <div class="custom-select">
                            <input type="text" id="searchIsFrozen" placeholder="请选择">
                            <span class="select-arrow">▼</span>
                            <span class="clear-btn">×</span>
                            <div class="select-dropdown" id="searchIsFrozenDropdown">
                                <div class="select-option" data-value="true">是</div>
                                <div class="select-option" data-value="false">否</div>
                            </div>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-primary" onclick="searchInventory()">查询</button>
                        <button type="button" class="btn btn-secondary">导出</button>
                    </div>
                </form>
            </section>

            <section class="table-section">
                <div class="table-scroll-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th><input type="checkbox" class="table-checkbox checkbox-all"></th>
                                <th>仓库</th>
                                <th>货主</th>
                                <th>商品编码</th>
                                <th>商品名称</th>
                                <th>库存量</th>
                                <th>占用量</th>
                                <th>储位</th>
                                <th>容器</th>
                                <th>供应商</th>
                                <th>入库日期</th>
                                <th>生产日期</th>
                                <th>来源类型</th>
                                <th>来源单号</th>
                                <th>是否冻结</th>
                                <th>更新时间</th>
                                <th>更新人</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- 数据将通过JavaScript动态生成 -->
                        </tbody>
                    </table>
                </div>
                
                <!-- 分页组件容器 -->
                <div id="pagination-container"></div>
            </section>
        </main>
    </div>

    <!-- 引入公共脚本 -->
    <script src="../js/common.js"></script>
    <script src="../js/pagination.js"></script>
    <script src="../js/form-utils.js"></script>
    <script src="../js/modal-manager.js"></script>
    <script src="../js/page-manager.js"></script>
    <script>
        // 模拟数据
        const inventoryData = [
            {
                warehouse: 'W001 南京仓',
                company: 'C001 货主1',
                skuCode: 'SKU001',
                skuName: '商品A',
                inventoryStatus: '正常',
                quantity: 100,
                occupied: 20,
                location: 'A-01-01',
                lpn: 'LPN001',
                supplier: '供应商A',
                inDate: '2026-02-01',
                productionDate: '2026-01-15',
                sourceType: '收货',
                sourceOrder: 'PO001',
                isFrozen: '否',
                updateTime: '2026-02-10 10:00:00',
                updateUser: 'admin'
            },
            {
                warehouse: 'W001 南京仓',
                company: 'C002 货主2',
                skuCode: 'SKU002',
                skuName: '商品B',
                inventoryStatus: '正常',
                quantity: 200,
                occupied: 50,
                location: 'B-02-03',
                lpn: 'LPN002',
                supplier: '供应商B',
                inDate: '2026-02-02',
                productionDate: '2026-01-20',
                sourceType: '上架',
                sourceOrder: 'WO001',
                isFrozen: '是',
                updateTime: '2026-02-10 11:00:00',
                updateUser: 'admin'
            },
            {
                warehouse: 'W001 南京仓',
                company: 'C003 货主3',
                skuCode: 'SKU003',
                skuName: '商品C',
                inventoryStatus: '异常',
                quantity: 50,
                occupied: 10,
                location: 'C-03-02',
                lpn: 'LPN003',
                supplier: '供应商C',
                inDate: '2026-02-03',
                productionDate: '2026-01-25',
                sourceType: '补货',
                sourceOrder: 'RO001',
                isFrozen: '否',
                updateTime: '2026-02-10 12:00:00',
                updateUser: 'admin'
            }
        ];

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            try {
                // 初始化下拉框数据
                const companyDropdown = document.getElementById('searchCompanyDropdown');
                const companies = ['C001 货主1', 'C002 货主2', 'C003 货主3', 'C004 货主4', 'C005 货主5'];
                companies.forEach(company => {
                    const option = document.createElement('div');
                    option.className = 'select-option';
                    option.setAttribute('data-value', company);
                    option.textContent = company;
                    companyDropdown.appendChild(option);
                });

                // 加载库存数据
                function loadInventoryData() {
                    const tbody = document.querySelector('#tableBody');
                    tbody.innerHTML = '';
                    
                    inventoryData.forEach(item => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td><input type="checkbox" class="table-checkbox checkbox-row"></td>
                            <td>${item.warehouse}</td>
                            <td>${item.company}</td>
                            <td>${item.skuCode}</td>
                            <td>${item.skuName}</td>
                            <td>${item.quantity}</td>
                            <td>${item.occupied}</td>
                            <td>${item.location}</td>
                            <td>${item.lpn}</td>
                            <td>${item.supplier}</td>
                            <td>${item.inDate}</td>
                            <td>${item.productionDate}</td>
                            <td>${item.sourceType}</td>
                            <td>${item.sourceOrder}</td>
                            <td><span class="status ${item.isFrozen === '否' ? 'active' : 'inactive'}">${item.isFrozen}</span></td>
                            <td>${item.updateTime}</td>
                            <td>${item.updateUser}</td>
                            <td class="action-links">
                                ${item.isFrozen === '否' ? '<a href="#" class="freeze-btn">冻结</a>' : ''}
                                ${item.isFrozen === '是' ? '<a href="#" class="unfreeze-btn">解冻</a>' : ''}
                            </td>
                        `;
                        tbody.appendChild(row);
                    });
                }

                // 搜索库存
                function searchInventory() {
                    // 获取搜索条件
                    const company = document.getElementById('searchCompany').value.trim();
                    const skuCode = document.getElementById('searchSkuCode').value.trim();
                    const skuName = document.getElementById('searchSkuName').value.trim();
                    const sourceType = document.getElementById('searchSourceType').value.trim();
                    const sourceOrder = document.getElementById('searchSourceOrder').value.trim();
                    const location = document.getElementById('searchLocation').value.trim();
                    const lpn = document.getElementById('searchLpn').value.trim();
                    const isFrozen = document.getElementById('searchIsFrozen').value.trim();
                    
                    // 这里可以添加搜索逻辑
                    console.log('搜索条件:', {
                        company,
                        skuCode,
                        skuName,
                        sourceType,
                        sourceOrder,
                        location,
                        lpn,
                        isFrozen
                    });
                    
                    // 模拟搜索结果
                    loadInventoryData();
                }

                // 冻结库存
                function freezeInventory(btn) {
                    // 冻结逻辑已移除
                }

                // 解冻库存
                function unfreezeInventory(btn) {
                    // 解冻逻辑已移除
                }

                // 使用PageManager简化页面逻辑
                const page = new PageManager({
                    entityName: '库存',
                    statusColumnIndex: 14,
                    
                    // 搜索区域下拉框
                    customSelects: [
                        { inputId: 'searchCompany', dropdownId: 'searchCompanyDropdown' },
                        { inputId: 'searchSourceType', dropdownId: 'searchSourceTypeDropdown' },
                        { inputId: 'searchIsFrozen', dropdownId: 'searchIsFrozenDropdown' }
                    ],
                    
                    deleteModal: {
                        modalId: 'confirmDeleteModal',
                        closeBtnId: 'confirmDeleteCloseBtn',
                        cancelBtnId: 'cancelDeleteBtn',
                        confirmBtnId: 'confirmDeleteBtn'
                    }
                });
                
                page.init();
                
                // 加载初始数据
                loadInventoryData();

                // 绑定冻结/解冻按钮事件（仅阻止默认行为）
                document.addEventListener('click', (e) => {
                    if (e.target.classList.contains('freeze-btn') || e.target.classList.contains('unfreeze-btn')) {
                        e.preventDefault();
                        // 点击逻辑已移除
                    }
                });
            } catch (error) {
                console.error('初始化错误:', error);
                // 避免showToast可能不存在的问题
                if (typeof showToast === 'function') {
                    showToast('页面初始化失败，请刷新重试', 'error');
                }
            }
        });
    </script>
</body>
</html>
