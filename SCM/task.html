<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冷丰WMS - 任务</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/components.css">
    <style>
        .search-form .form-group > label {
            width: 120px;
        }
        .task-no-link {
            color: #1677ff;
            cursor: pointer;
            text-decoration: none;
        }
        .task-no-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div id="sidebar-container"></div>
    <script src="../js/path-prefix.js"></script>
    <script src="../js/wms-sidebar.js"></script>
    <div id="header-container"></div>

    <div class="container">
        <main class="main-content">
            <div class="content-tabs">
                <button class="active">任务</button>
            </div>

            <hr class="content-divider">

            <div class="content-title">任务管理 / 任务</div>

            <section class="search-section">
                <form class="search-form">
                    <div class="form-group custom-select-wrapper">
                        <label>货主:</label>
                        <div class="custom-select">
                            <input type="text" id="searchCompany" placeholder="请选择">
                            <span class="select-arrow">▼</span>
                            <span class="clear-btn">×</span>
                            <div class="select-dropdown" id="searchCompanyDropdown"></div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>任务号:</label>
                        <div class="input-wrapper">
                            <input type="text" id="searchTaskNo" placeholder="请输入">
                            <span class="clear-btn">×</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>任务组号:</label>
                        <div class="input-wrapper">
                            <input type="text" id="searchTaskGroupNo" placeholder="请输入">
                            <span class="clear-btn">×</span>
                        </div>
                    </div>
                    <div class="form-group custom-select-wrapper">
                        <label>任务状态:</label>
                        <div class="custom-select">
                            <input type="text" id="searchTaskStatus" placeholder="请选择">
                            <span class="select-arrow">▼</span>
                            <span class="clear-btn">×</span>
                            <div class="select-dropdown" id="searchTaskStatusDropdown">
                                <div class="select-option" data-value="初始">初始</div>
                                <div class="select-option" data-value="已释放">已释放</div>
                                <div class="select-option" data-value="已指派">已指派</div>
                                <div class="select-option" data-value="已完成">已完成</div>
                                <div class="select-option" data-value="已取消">已取消</div>
                            </div>
                        </div>
                    </div>
                    <div class="form-group custom-select-wrapper">
                        <label>任务类型:</label>
                        <div class="custom-select">
                            <input type="text" id="searchTaskType" placeholder="请选择">
                            <span class="select-arrow">▼</span>
                            <span class="clear-btn">×</span>
                            <div class="select-dropdown" id="searchTaskTypeDropdown">
                                <div class="select-option" data-value="质检任务">质检任务</div>
                                <div class="select-option" data-value="拣货任务">拣货任务</div>
                                <div class="select-option" data-value="盘点任务">盘点任务</div>
                            </div>
                        </div>
                    </div>
                    <div class="form-group custom-select-wrapper">
                        <label>任务来源:</label>
                        <div class="custom-select">
                            <input type="text" id="searchTaskSource" placeholder="请选择">
                            <span class="select-arrow">▼</span>
                            <span class="clear-btn">×</span>
                            <div class="select-dropdown" id="searchTaskSourceDropdown">
                                <div class="select-option" data-value="入库">入库</div>
                                <div class="select-option" data-value="出库">出库</div>
                                <div class="select-option" data-value="盘点">盘点</div>
                            </div>
                        </div>
                    </div>
                    <div class="form-group custom-select-wrapper">
                        <label>任务来源类型:</label>
                        <div class="custom-select">
                            <input type="text" id="searchTaskSourceType" placeholder="请选择">
                            <span class="select-arrow">▼</span>
                            <span class="clear-btn">×</span>
                            <div class="select-dropdown" id="searchTaskSourceTypeDropdown">
                                <div class="select-option" data-value="采购入库">采购入库</div>
                                <div class="select-option" data-value="退货入库">退货入库</div>
                                <div class="select-option" data-value="调拨入库">调拨入库</div>
                            </div>
                        </div>
                    </div>
                    <div class="form-group custom-select-wrapper">
                        <label>任务来源业务类型:</label>
                        <div class="custom-select">
                            <input type="text" id="searchTaskSourceBizType" placeholder="请选择">
                            <span class="select-arrow">▼</span>
                            <span class="clear-btn">×</span>
                            <div class="select-dropdown" id="searchTaskSourceBizTypeDropdown">
                                <div class="select-option" data-value="直送仓库">直送仓库</div>
                                <div class="select-option" data-value="门店退货">门店退货</div>
                                <div class="select-option" data-value="仓库调拨">仓库调拨</div>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>调用单号:</label>
                        <div class="input-wrapper">
                            <input type="text" id="searchInvokeNo" placeholder="请输入">
                            <span class="clear-btn">×</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>来源单号:</label>
                        <div class="input-wrapper">
                            <input type="text" id="searchSourceNo" placeholder="请输入">
                            <span class="clear-btn">×</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>关联单号:</label>
                        <div class="input-wrapper">
                            <input type="text" id="searchRelatedNo" placeholder="请输入">
                            <span class="clear-btn">×</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>商品:</label>
                        <div class="input-wrapper">
                            <input type="text" id="searchSkuKeyword" placeholder="请输入">
                            <span class="clear-btn">×</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>来源储位:</label>
                        <div class="input-wrapper">
                            <input type="text" id="searchSourceLocation" placeholder="请输入">
                            <span class="clear-btn">×</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>目的储位:</label>
                        <div class="input-wrapper">
                            <input type="text" id="searchTargetLocation" placeholder="请输入">
                            <span class="clear-btn">×</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>来源库区:</label>
                        <div class="input-wrapper">
                            <input type="text" id="searchSourceZone" placeholder="请输入">
                            <span class="clear-btn">×</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>目的库区:</label>
                        <div class="input-wrapper">
                            <input type="text" id="searchTargetZone" placeholder="请输入">
                            <span class="clear-btn">×</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>创建时间:</label>
                        <div class="date-range">
                            <div class="date-picker">
                                <input type="text" id="searchCreateTimeStart" placeholder="开始时间">
                            </div>
                            <span class="date-range-separator">至</span>
                            <div class="date-picker">
                                <input type="text" id="searchCreateTimeEnd" placeholder="结束时间">
                            </div>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-primary" onclick="searchTasks()">查询</button>
                    </div>
                </form>
            </section>

            <section class="table-section">
                <div class="table-scroll-container">
                    <table class="table no-last-column-freeze">
                        <thead>
                            <tr>
                                <th><input type="checkbox" class="table-checkbox checkbox-all"></th>
                                <th>任务号</th>
                                <th>任务组号</th>
                                <th>仓库</th>
                                <th>货主</th>
                                <th>任务状态</th>
                                <th>任务类型</th>
                                <th>任务来源</th>
                                <th>任务来源类型</th>
                                <th>任务来源业务类型</th>
                                <th>调用单号</th>
                                <th>来源单号</th>
                                <th>关联单号</th>
                                <th>商品编码</th>
                                <th>商品名称</th>
                                <th>单位</th>
                                <th>计划数量</th>
                                <th>完成数量</th>
                                <th>执行人</th>
                                <th>来源储位</th>
                                <th>目的储位</th>
                                <th>来源库区</th>
                                <th>目的库区</th>
                                <th>创建时间</th>
                                <th>创建人</th>
                                <th>更新时间</th>
                                <th>更新人</th>
                            </tr>
                        </thead>
                        <tbody id="taskTableBody"></tbody>
                    </table>
                </div>
                <div id="pagination-container"></div>
            </section>
        </main>
    </div>

    <script src="../js/common.js"></script>
    <script src="../js/pagination.js"></script>
    <script src="../js/form-utils.js"></script>
    <script src="../js/modal-manager.js"></script>
    <script src="../js/page-manager.js"></script>
    <script>
        const taskData = [
            {
                warehouse: 'W001-南京仓',
                company: '货主1',
                taskNo: 'TK20260319001',
                taskGroupNo: 'TG20260319001',
                taskStatus: '已释放',
                taskType: '拣货任务',
                taskSource: '出库',
                taskSourceType: '调拨入库',
                taskSourceBizType: '仓库调拨',
                invokeNo: 'INV001',
                invokeDetailId: 'INVD-001',
                sourceNo: 'SO001',
                relatedNo: 'RO001',
                autoRelease: '是',
                priority: '高',
                skuCode: 'SKU001',
                skuName: '冷冻牛肉',
                uom: '箱',
                planQty: '120',
                doneQty: '60',
                executor: '张三',
                planStartTime: '2026-03-19 09:00:00',
                planFinishTime: '2026-03-19 12:00:00',
                startTime: '2026-03-19 09:10:00',
                finishTime: '',
                sourceLocation: 'A01-01-01',
                targetLocation: 'B01-02-01',
                sourceZone: 'A库区',
                targetZone: 'B库区',
                sourceWorkArea: '入库作业区',
                targetWorkArea: '出库作业区',
                sourceBatchNo: 'BN001',
                targetBatchNo: 'BN001',
                sourceProductionDate: '2026-01-10',
                targetProductionDate: '2026-01-10',
                sourcePickOrder: '10',
                targetPutawayOrder: '20',
                sourceInventoryOrder: '30',
                preTaskId: 'PRE-T001',
                preTaskGroupId: 'PRE-TG001',
                groupName1: '分组名1',
                groupName2: '分组名2',
                groupName3: '分组名3',
                groupName4: '分组名4',
                groupName5: '分组名5',
                groupValue1: '冷链',
                groupValue2: '华东',
                groupValue3: '',
                groupValue4: '',
                groupValue5: '',
                fetchName1: '取用名1',
                fetchName2: '取用名2',
                fetchName3: '取用名3',
                fetchName4: '取用名4',
                fetchName5: '取用名5',
                fetchValue1: '来源单号',
                fetchValue2: '商品',
                fetchValue3: '',
                fetchValue4: '',
                fetchValue5: '',
                mergeParam1: '调用明细ID',
                mergeParam2: '生产日期',
                mergeParam3: '',
                mergeParam4: '',
                mergeParam5: '',
                createTime: '2026-03-19 08:30:00',
                createUser: 'admin',
                updateTime: '2026-03-19 09:20:00',
                updateUser: 'admin'
            }
        ];

        function openTaskDetail(taskNo) {
            window.location.href = 'task_detail.html?taskNo=' + encodeURIComponent(taskNo);
        }

        function renderTaskTable(data) {
            const tbody = document.getElementById('taskTableBody');
            if (!tbody) return;
            tbody.innerHTML = '';

            data.forEach(item => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><input type="checkbox" class="table-checkbox checkbox-row"></td>
                    <td><a class="task-no-link" onclick="openTaskDetail('${item.taskNo}')">${item.taskNo}</a></td>
                    <td>${item.taskGroupNo}</td>
                    <td>${item.warehouse}</td>
                    <td>${item.company}</td>
                    <td>${item.taskStatus}</td>
                    <td>${item.taskType}</td>
                    <td>${item.taskSource}</td>
                    <td>${item.taskSourceType}</td>
                    <td>${item.taskSourceBizType}</td>
                    <td>${item.invokeNo}</td>
                    <td>${item.sourceNo}</td>
                    <td>${item.relatedNo}</td>
                    <td>${item.skuCode}</td>
                    <td>${item.skuName}</td>
                    <td>${item.uom}</td>
                    <td>${item.planQty}</td>
                    <td>${item.doneQty}</td>
                    <td>${item.executor}</td>
                    <td>${item.sourceLocation}</td>
                    <td>${item.targetLocation}</td>
                    <td>${item.sourceZone}</td>
                    <td>${item.targetZone}</td>
                    <td>${item.createTime}</td>
                    <td>${item.createUser}</td>
                    <td>${item.updateTime}</td>
                    <td>${item.updateUser}</td>
                `;
                tbody.appendChild(row);
            });
        }

        function getUrlTaskGroupNo() {
            const params = new URLSearchParams(window.location.search);
            return params.get('taskGroupNo') || '';
        }

        function searchTasks() {
            const filters = {
                company: document.getElementById('searchCompany').value.trim(),
                taskNo: document.getElementById('searchTaskNo').value.trim(),
                taskGroupNo: document.getElementById('searchTaskGroupNo').value.trim(),
                taskStatus: document.getElementById('searchTaskStatus').value.trim(),
                taskType: document.getElementById('searchTaskType').value.trim(),
                taskSource: document.getElementById('searchTaskSource').value.trim(),
                taskSourceType: document.getElementById('searchTaskSourceType').value.trim(),
                taskSourceBizType: document.getElementById('searchTaskSourceBizType').value.trim(),
                invokeNo: document.getElementById('searchInvokeNo').value.trim(),
                sourceNo: document.getElementById('searchSourceNo').value.trim(),
                relatedNo: document.getElementById('searchRelatedNo').value.trim(),
                skuKeyword: document.getElementById('searchSkuKeyword').value.trim(),
                sourceLocation: document.getElementById('searchSourceLocation').value.trim(),
                targetLocation: document.getElementById('searchTargetLocation').value.trim(),
                sourceZone: document.getElementById('searchSourceZone').value.trim(),
                targetZone: document.getElementById('searchTargetZone').value.trim(),
                createTimeStart: document.getElementById('searchCreateTimeStart').value.trim(),
                createTimeEnd: document.getElementById('searchCreateTimeEnd').value.trim()
            };

            const result = taskData.filter(item => {
                const skuMatched = !filters.skuKeyword ||
                    item.skuCode.includes(filters.skuKeyword) ||
                    item.skuName.includes(filters.skuKeyword);
                return (!filters.company || item.company.includes(filters.company)) &&
                       (!filters.taskNo || item.taskNo.includes(filters.taskNo)) &&
                       (!filters.taskGroupNo || item.taskGroupNo.includes(filters.taskGroupNo)) &&
                       (!filters.taskStatus || item.taskStatus === filters.taskStatus) &&
                       (!filters.taskType || item.taskType === filters.taskType) &&
                       (!filters.taskSource || item.taskSource === filters.taskSource) &&
                       (!filters.taskSourceType || item.taskSourceType === filters.taskSourceType) &&
                       (!filters.taskSourceBizType || item.taskSourceBizType === filters.taskSourceBizType) &&
                       (!filters.invokeNo || item.invokeNo.includes(filters.invokeNo)) &&
                       (!filters.sourceNo || item.sourceNo.includes(filters.sourceNo)) &&
                       (!filters.relatedNo || item.relatedNo.includes(filters.relatedNo)) &&
                       skuMatched &&
                       (!filters.sourceLocation || item.sourceLocation.includes(filters.sourceLocation)) &&
                       (!filters.targetLocation || item.targetLocation.includes(filters.targetLocation)) &&
                       (!filters.sourceZone || item.sourceZone.includes(filters.sourceZone)) &&
                       (!filters.targetZone || item.targetZone.includes(filters.targetZone)) &&
                       (!filters.createTimeStart || item.createTime >= filters.createTimeStart) &&
                       (!filters.createTimeEnd || item.createTime <= filters.createTimeEnd);
            });

            renderTaskTable(result);
        }

        document.addEventListener('DOMContentLoaded', () => {
            try {
                const companyDropdown = document.getElementById('searchCompanyDropdown');
                ['货主1', '货主2', '货主3'].forEach(company => {
                    const option = document.createElement('div');
                    option.className = 'select-option';
                    option.setAttribute('data-value', company);
                    option.textContent = company;
                    companyDropdown.appendChild(option);
                });

                const page = new PageManager({
                    entityName: '任务',
                    customSelects: [
                        { inputId: 'searchCompany', dropdownId: 'searchCompanyDropdown' },
                        { inputId: 'searchTaskStatus', dropdownId: 'searchTaskStatusDropdown' },
                        { inputId: 'searchTaskType', dropdownId: 'searchTaskTypeDropdown' },
                        { inputId: 'searchTaskSource', dropdownId: 'searchTaskSourceDropdown' },
                        { inputId: 'searchTaskSourceType', dropdownId: 'searchTaskSourceTypeDropdown' },
                        { inputId: 'searchTaskSourceBizType', dropdownId: 'searchTaskSourceBizTypeDropdown' }
                    ],
                    deleteModal: {}
                });
                page.init();

                const urlTaskGroupNo = getUrlTaskGroupNo();
                if (urlTaskGroupNo) {
                    const input = document.getElementById('searchTaskGroupNo');
                    if (input) {
                        input.value = urlTaskGroupNo;
                    }
                    searchTasks();
                } else {
                    renderTaskTable(taskData);
                }
            } catch (error) {
                console.error('任务页面初始化错误:', error);
                if (typeof showToast === 'function') {
                    showToast('任务页面初始化失败，请刷新重试', 'error');
                }
            }
        });
    </script>
</body>
</html>
