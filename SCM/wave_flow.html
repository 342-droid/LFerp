<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冷丰WMS - 波次流程</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/components.css">
</head>
<body>
    <div id="sidebar-container"></div>
    <script src="../js/path-prefix.js"></script>
    <script src="../js/wms-sidebar.js"></script>

    <div id="header-container"></div>

    <div class="container">
        <main class="main-content">
            <div class="content-tabs">
                <button class="active">波次流程</button>
            </div>

            <hr class="content-divider">

            <div class="content-title">策略管理 / 波次流程</div>

            <section class="search-section">
                <form class="search-form">
                    <div class="form-group custom-select-wrapper">
                        <label>流程类型:</label>
                        <div class="custom-select">
                            <input type="text" id="searchFlowType" placeholder="请选择">
                            <span class="select-arrow">▼</span>
                            <span class="clear-btn">×</span>
                            <div class="select-dropdown" id="searchFlowTypeDropdown">
                                <div class="select-option" data-value="先拣后分">先拣后分</div>
                            </div>
                        </div>
                    </div>
                    <div class="form-group custom-select-wrapper">
                        <label style="width: 100px;">是否启用:</label>
                        <div class="custom-select">
                            <input type="text" id="searchIsEnabled" placeholder="请选择">
                            <span class="select-arrow">▼</span>
                            <span class="clear-btn">×</span>
                            <div class="select-dropdown" id="searchIsEnabledDropdown">
                                <div class="select-option" data-value="启用">启用</div>
                                <div class="select-option" data-value="禁用">禁用</div>
                            </div>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-primary" onclick="location.reload()">查询</button>
                        <button type="button" class="btn btn-secondary" id="addBtn">新增</button>
                    </div>
                </form>
            </section>

            <section class="table-section">
                <div class="table-scroll-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th><input type="checkbox" class="table-checkbox checkbox-all"></th>
                                <th>流程类型</th>
                                <th>流程描述</th>
                                <th>是否启用</th>
                                <th>更新时间</th>
                                <th>更新人</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr>
                                <td><input type="checkbox" class="table-checkbox checkbox-row"></td>
                                <td>先拣后分</td>
                                <td>先完成拣货，再进行分播/分拣</td>
                                <td><span class="status active">启用</span></td>
                                <td>2026-03-24 10:30:00</td>
                                <td>张三</td>
                                <td class="action-links">
                                    <a href="#" class="edit-btn">编辑</a>
                                    <a href="#" class="delete-btn">删除</a>
                                </td>
                        </tbody>
                    </table>
                </div>

                <div id="pagination-container"></div>
            </section>
        </main>
    </div>

    <script src="../js/common.js"></script>
    <script src="../js/pagination.js"></script>
    <script src="../js/form-utils.js"></script>
    <script src="../js/modal-manager.js"></script>
    <script src="../js/page-manager.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const page = new PageManager({
                entityName: '波次流程',
                statusColumnIndex: 3,
                detailView: { enabled: true },

                customSelects: [
                    { inputId: 'searchFlowType', dropdownId: 'searchFlowTypeDropdown' },
                    { inputId: 'searchIsEnabled', dropdownId: 'searchIsEnabledDropdown' }
                ],

                fields: [
                    {
                        id: 'flowType',
                        label: '流程类型',
                        type: 'select',
                        required: true,
                        options: [
                            { value: '先拣后分', text: '先拣后分' }
                        ]
                    },
                    { id: 'flowDesc', label: '流程描述', type: 'text', required: true },
                    {
                        id: 'isEnabled',
                        label: '是否启用',
                        type: 'select',
                        required: true,
                        options: [
                            { value: '启用', text: '启用' },
                            { value: '禁用', text: '禁用' }
                        ]
                    }
                ],

                addModal: {
                    modalId: 'waveFlowModal',
                    cancelBtnId: 'cancelBtn',
                    saveBtnId: 'saveBtn',
                    triggerBtnId: 'addBtn',
                    validations: [
                        { id: 'flowType', message: '请选择流程类型', required: true },
                        { id: 'flowDesc', message: '请输入流程描述', required: true },
                        { id: 'isEnabled', message: '请选择是否启用', required: true }
                    ],
                    onSave: () => {
                        const flowType = document.getElementById('flowType').value.trim();
                        const flowDesc = document.getElementById('flowDesc').value.trim();
                        const isEnabled = document.getElementById('isEnabled').value.trim();

                        page.addTableRow({
                            cells: [
                                flowType,
                                flowDesc,
                                { value: isEnabled, isStatus: true },
                                page.getCurrentTimeStr(),
                                '当前用户'
                            ]
                        });
                        showToast('波次流程已保存', 'success');
                    }
                },

                editModal: {
                    modalId: 'waveFlowEditModal',
                    cancelBtnId: 'editCancelBtn',
                    saveBtnId: 'editSaveBtn',
                    validations: [
                        { id: 'editFlowType', message: '请选择流程类型', required: true },
                        { id: 'editFlowDesc', message: '请输入流程描述', required: true },
                        { id: 'editIsEnabled', message: '请选择是否启用', required: true }
                    ],
                    onSave: () => {
                        if (!page.currentEditRow) return;
                        page.updateTableRow(page.currentEditRow, {
                            1: document.getElementById('editFlowType').value.trim(),
                            2: document.getElementById('editFlowDesc').value.trim(),
                            3: { value: document.getElementById('editIsEnabled').value.trim(), isStatus: true },
                            4: page.getCurrentTimeStr(),
                            5: '当前用户'
                        });
                        showToast('波次流程已更新', 'success');
                        page.currentEditRow = null;
                    },
                    mapRowToForm: (row) => {
                        page.currentEditRow = row;
                        const cells = row.querySelectorAll('td');
                        return {
                            editFlowType: cells[1].textContent,
                            editFlowDesc: cells[2].textContent,
                            editIsEnabled: cells[3].querySelector('.status').textContent
                        };
                    }
                },

                deleteModal: {
                    modalId: 'confirmDeleteModal',
                    closeBtnId: 'confirmDeleteCloseBtn',
                    cancelBtnId: 'cancelDeleteBtn',
                    confirmBtnId: 'confirmDeleteBtn'
                }
            });

            page.init();
            document.getElementById('editCloseBtn').addEventListener('click', () => page.closeModal('edit'));
        });
    </script>
</body>
</html>
