<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冷丰WMS - 波次模板</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/components.css">
    <style>
        .modal-section-title {
            width: 100%;
            flex: 0 0 100%;
            max-width: 100%;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin: 0;
            padding-bottom: 8px;
            border-bottom: 1px solid #e8e8e8;
        }

        .modal-section-title + .modal-form-group {
            margin-top: 0;
        }

        .modal-form > .modal-section-title:not(:first-child) {
            margin-top: 4px;
        }

        .modal-form-line-break {
            flex: 0 0 100%;
            width: 100%;
            height: 0;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <div id="sidebar-container"></div>
    <script src="../js/path-prefix.js"></script>
    <script src="../js/wms-sidebar.js"></script>

    <div id="header-container"></div>

    <div class="container">
        <main class="main-content">
            <div class="content-tabs">
                <button class="active">波次模板</button>
            </div>

            <hr class="content-divider">

            <div class="content-title">策略管理 / 波次模板</div>

            <section class="search-section">
                <form class="search-form">
                    <div class="form-group">
                        <label>波次模板编码:</label>
                        <div class="input-wrapper">
                            <input type="text" id="searchTemplateCode" placeholder="请输入">
                            <span class="clear-btn">×</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>波次模板名称:</label>
                        <div class="input-wrapper">
                            <input type="text" id="searchTemplateName" placeholder="请输入">
                            <span class="clear-btn">×</span>
                        </div>
                    </div>
                    <div class="form-group custom-select-wrapper">
                        <label>流程类型:</label>
                        <div class="custom-select">
                            <input type="text" id="searchFlowType" placeholder="请选择">
                            <span class="select-arrow">▼</span>
                            <span class="clear-btn">×</span>
                            <div class="select-dropdown" id="searchFlowTypeDropdown"></div>
                        </div>
                    </div>
                    <div class="form-group custom-select-wrapper">
                        <label>出库类型:</label>
                        <div class="custom-select">
                            <input type="text" id="searchOutboundType" placeholder="请选择">
                            <span class="select-arrow">▼</span>
                            <span class="clear-btn">×</span>
                            <div class="select-dropdown" id="searchOutboundTypeDropdown"></div>
                        </div>
                    </div>
                    <div class="form-group custom-select-wrapper">
                        <label>出库业务类型:</label>
                        <div class="custom-select">
                            <input type="text" id="searchOutboundBizType" placeholder="请选择">
                            <span class="select-arrow">▼</span>
                            <span class="clear-btn">×</span>
                            <div class="select-dropdown" id="searchOutboundBizTypeDropdown"></div>
                        </div>
                    </div>
                    <div class="form-group custom-select-wrapper">
                        <label style="width: 100px;">是否启用:</label>
                        <div class="custom-select">
                            <input type="text" id="searchIsEnabled" placeholder="请选择">
                            <span class="select-arrow">▼</span>
                            <span class="clear-btn">×</span>
                            <div class="select-dropdown" id="searchIsEnabledDropdown">
                                <div class="select-option" data-value="启用">启用</div>
                                <div class="select-option" data-value="禁用">禁用</div>
                            </div>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-primary" onclick="location.reload()">查询</button>
                        <button type="button" class="btn btn-secondary" id="addBtn">新增</button>
                    </div>
                </form>
            </section>

            <section class="table-section">
                <div class="table-scroll-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th><input type="checkbox" class="table-checkbox checkbox-all"></th>
                                <th>波次模板编码</th>
                                <th>波次模板名称</th>
                                <th>仓库</th>
                                <th>流程类型</th>
                                <th>出库类型</th>
                                <th>出库业务类型</th>
                                <th>是否启用</th>
                                <th>更新时间</th>
                                <th>更新人</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr>
                                <td><input type="checkbox" class="table-checkbox checkbox-row"></td>
                                <td>WT001</td>
                                <td>摘果标准模板</td>
                                <td>W001-南京仓</td>
                                <td>摘果</td>
                                <td>销售出库</td>
                                <td>直播订单</td>
                                <td><span class="status active">启用</span></td>
                                <td>2026-03-24 10:30:00</td>
                                <td>张三</td>
                                <td class="action-links">
                                    <a href="#" class="edit-btn">编辑</a>
                                    <a href="#" class="delete-btn">删除</a>
                                </td>
                            </tr>
                            <tr>
                                <td><input type="checkbox" class="table-checkbox checkbox-row"></td>
                                <td>WT002</td>
                                <td>播种分播模板</td>
                                <td>W002-嘉兴仓</td>
                                <td>播种</td>
                                <td>仓配出库</td>
                                <td>配送出库</td>
                                <td><span class="status active">启用</span></td>
                                <td>2026-03-24 11:15:00</td>
                                <td>李四</td>
                                <td class="action-links">
                                    <a href="#" class="edit-btn">编辑</a>
                                    <a href="#" class="delete-btn">删除</a>
                                </td>
                            </tr>
                            <tr data-allow-negative-inventory="否">
                                <td><input type="checkbox" class="table-checkbox checkbox-row"></td>
                                <td>WT003</td>
                                <td>一键出库模板</td>
                                <td>W003-上海仓</td>
                                <td>一键出库</td>
                                <td>销售出库</td>
                                <td>直播订单</td>
                                <td><span class="status inactive">禁用</span></td>
                                <td>2026-03-23 16:45:00</td>
                                <td>王五</td>
                                <td class="action-links">
                                    <a href="#" class="edit-btn">编辑</a>
                                    <a href="#" class="delete-btn">删除</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div id="pagination-container"></div>
            </section>
        </main>
    </div>

    <script src="../js/common.js"></script>
    <script src="../js/pagination.js"></script>
    <script src="../js/form-utils.js"></script>
    <script src="../js/modal-manager.js"></script>
    <script src="../js/page-manager.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const outboundTypeOptions = CommonOptions.outboundType;
            const outboundBizTypeOptions = CommonOptions.outboundBizType;

            const warehouseOptions = [
                { value: 'W001', text: 'W001-南京仓' },
                { value: 'W002', text: 'W002-嘉兴仓' },
                { value: 'W003', text: 'W003-上海仓' },
                { value: 'W004', text: 'W004-北京仓' }
            ];

            const yesNoOptions = [
                { value: '是', text: '是' },
                { value: '否', text: '否' }
            ];

            const isEnabledOptions = [
                { value: '启用', text: '启用' },
                { value: '禁用', text: '禁用' }
            ];

            function setRadioGroupEnabled(radioName, enabled) {
                document.querySelectorAll(`input[name="${radioName}"]`).forEach((radio) => {
                    radio.disabled = !enabled;
                });
            }

            function syncGroupByOwner(isEdit, value = '是') {
                const radioName = isEdit ? 'editGroupByOwner' : 'groupByOwner';
                setRadioValue(radioName, value);
                setRadioGroupEnabled(radioName, false);
            }

            function buildModalSectionTitle(title) {
                return `<div class="modal-section-title">${title}</div>`;
            }

            function buildModalLineBreak() {
                return '<div class="modal-form-line-break" aria-hidden="true"></div>';
            }

            function setRadioValue(name, value) {
                const radio = document.querySelector(`input[name="${name}"][value="${value}"]`);
                if (radio) radio.checked = true;
            }

            function syncAllowNegativeInventory(isEdit, flowType, options = {}) {
                const { readOnly = false, resetDefault = false, value } = options;
                const radioName = isEdit ? 'editAllowNegativeInventory' : 'allowNegativeInventory';
                const isOneClickOutbound = flowType === '一键出库';

                if (!isOneClickOutbound) {
                    setRadioValue(radioName, '否');
                    setRadioGroupEnabled(radioName, false);
                    return;
                }

                if (!readOnly) {
                    setRadioGroupEnabled(radioName, true);
                }

                if (value) {
                    setRadioValue(radioName, value);
                } else {
                    const checked = document.querySelector(`input[name="${radioName}"]:checked`);
                    if (resetDefault || !checked) {
                        setRadioValue(radioName, '否');
                    }
                }
            }

            function syncShortageAllocation(isEdit, flowType, options = {}) {
                const { readOnly = false, resetDefault = false } = options;
                const radioName = isEdit ? 'editShortageAllocation' : 'shortageAllocation';
                const isOneClickOutbound = flowType === '一键出库';

                if (isOneClickOutbound) {
                    setRadioValue(radioName, '否');
                    setRadioGroupEnabled(radioName, false);
                    return;
                }

                if (!readOnly) {
                    setRadioGroupEnabled(radioName, true);
                }

                const checked = document.querySelector(`input[name="${radioName}"]:checked`);
                if (resetDefault || !checked) {
                    setRadioValue(radioName, '是');
                }
            }

            function handleFlowTypeChange(isEdit, options = {}) {
                const inputId = isEdit ? 'editFlowType' : 'flowType';
                const input = document.getElementById(inputId);
                if (!input) return;

                const flowType = (options.flowType ?? input.value).trim();
                const prevFlowType = options.prevFlowType ?? input.dataset.prevFlowType ?? '';

                syncShortageAllocation(isEdit, flowType, {
                    readOnly: isEdit && page.isDetailMode,
                    resetDefault: options.resetAllDefaults ?? (
                        prevFlowType === '一键出库' && flowType !== '一键出库'
                    )
                });
                syncAllowNegativeInventory(isEdit, flowType, {
                    readOnly: isEdit && page.isDetailMode,
                    resetDefault: options.resetAllDefaults ?? (prevFlowType !== flowType),
                    value: options.value
                });
                input.dataset.prevFlowType = flowType;
            }

            function hookFlowTypeDropdown(inputId, isEdit) {
                const dropdown = document.getElementById(`${inputId}Dropdown`);
                if (!dropdown || dropdown.dataset.flowTypeHooked) return;
                dropdown.dataset.flowTypeHooked = '1';
                dropdown.addEventListener('click', (e) => {
                    if (!e.target.closest('.select-option')) return;
                    if (isEdit && page.isDetailMode) return;
                    requestAnimationFrame(() => handleFlowTypeChange(isEdit));
                });
            }

            function bindFlowTypeSync() {
                const addModal = document.getElementById('waveTemplateModal');
                if (addModal && !addModal.dataset.flowTypeBound) {
                    addModal.dataset.flowTypeBound = '1';
                    addModal.addEventListener('change', (e) => {
                        if (e.target.id === 'flowType') {
                            handleFlowTypeChange(false);
                        }
                    });
                }

                const editModal = document.getElementById('waveTemplateEditModal');
                if (editModal && !editModal.dataset.flowTypeBound) {
                    editModal.dataset.flowTypeBound = '1';
                    editModal.addEventListener('change', (e) => {
                        if (e.target.id === 'editFlowType' && !page.isDetailMode) {
                            handleFlowTypeChange(true);
                        }
                    });
                }

                hookFlowTypeDropdown('flowType', false);
                hookFlowTypeDropdown('editFlowType', true);
            }

            const page = new PageManager({
                entityName: '波次模板',
                statusColumnIndex: 7,
                detailView: { enabled: true },
                customSelects: [
                    { inputId: 'searchFlowType', dropdownId: 'searchFlowTypeDropdown' },
                    { inputId: 'searchOutboundType', dropdownId: 'searchOutboundTypeDropdown' },
                    { inputId: 'searchOutboundBizType', dropdownId: 'searchOutboundBizTypeDropdown' },
                    { inputId: 'searchIsEnabled', dropdownId: 'searchIsEnabledDropdown' }
                ],
                fields: [
                    { id: 'sectionBasic', type: 'raw', content: buildModalSectionTitle('基础信息') },
                    { id: 'warehouse', label: '仓库', type: 'select', required: true, disabled: true, options: warehouseOptions },
                    { id: 'templateCode', label: '波次模板编码', type: 'text', required: true },
                    { id: 'templateName', label: '波次模板名称', type: 'text', required: true },
                    { id: 'flowType', label: '流程类型', type: 'select', required: true, options: CommonOptions.flowType },
                    { id: 'outboundType', label: '出库类型', type: 'select', required: true, options: outboundTypeOptions },
                    { id: 'outboundBizType', label: '出库业务类型', type: 'select', required: true, options: outboundBizTypeOptions },
                    { id: 'isEnabled', label: '是否启用', type: 'select', options: isEnabledOptions },
                    { id: 'sectionParams', type: 'raw', content: buildModalSectionTitle('参数') },
                    { id: 'timerExpression', label: '定时器表达式', type: 'text' },
                    { id: 'timerDesc', label: '定时器描述', type: 'text' },
                    { id: 'maxOrderCount', label: '最大单量', type: 'number' },
                    { id: 'minOrderCount', label: '最小单量', type: 'number' },
                    { id: 'radioFieldsBreak', type: 'raw', content: buildModalLineBreak() },
                    { id: 'groupByOwner', label: '按货主分组', type: 'radio', required: true, disabled: true, options: yesNoOptions },
                    { id: 'shortageAllocation', label: '缺量分配', type: 'radio', required: true, options: yesNoOptions },
                    { id: 'isHidden', label: '是否隐藏', type: 'radio', required: true, options: yesNoOptions },
                    { id: 'allowNegativeInventory', label: '允许负库存', type: 'radio', required: true, options: yesNoOptions }
                ],
                addModal: {
                    modalId: 'waveTemplateModal',
                    cancelBtnId: 'cancelBtn',
                    saveBtnId: 'saveBtn',
                    triggerBtnId: 'addBtn',
                    defaults: { isEnabled: '启用' },
                    validations: [
                        { id: 'warehouse', message: '请选择仓库', required: true },
                        { id: 'templateCode', message: '请输入波次模板编码', required: true },
                        { id: 'templateName', message: '请输入波次模板名称', required: true },
                        { id: 'flowType', message: '请选择流程类型', required: true },
                        { id: 'outboundType', message: '请选择出库类型', required: true },
                        { id: 'outboundBizType', message: '请选择出库业务类型', required: true },
                        { id: 'isEnabled', message: '请选择是否启用', required: true }
                    ],
                    onOpen: () => {
                        const currentWarehouse = getCurrentWarehouse();
                        const warehouseInput = document.getElementById('warehouse');
                        if (warehouseInput) {
                            if (currentWarehouse) {
                                warehouseInput.value = `${currentWarehouse.code}-${currentWarehouse.name}`;
                                warehouseInput.dataset.value = currentWarehouse.code;
                            } else {
                                warehouseInput.value = '';
                                warehouseInput.dataset.value = '';
                            }
                        }
                        syncGroupByOwner(false);
                        setRadioValue('isHidden', '否');
                        const flowTypeInput = document.getElementById('flowType');
                        if (flowTypeInput) {
                            flowTypeInput.dataset.prevFlowType = '';
                        }
                        handleFlowTypeChange(false, { resetAllDefaults: true });
                    },
                    onSave: () => {
                        const templateCode = document.getElementById('templateCode').value.trim();
                        const templateName = document.getElementById('templateName').value.trim();
                        const warehouse = document.getElementById('warehouse').value.trim();
                        const flowType = document.getElementById('flowType').value.trim();
                        const outboundType = document.getElementById('outboundType').value.trim();
                        const outboundBizType = document.getElementById('outboundBizType').value.trim();
                        const isEnabled = document.getElementById('isEnabled').value.trim();
                        const isHidden = document.querySelector('input[name="isHidden"]:checked')?.value || '否';
                        const groupByOwner = document.querySelector('input[name="groupByOwner"]:checked')?.value || '是';
                        const allowNegativeInventory = document.querySelector('input[name="allowNegativeInventory"]:checked')?.value || '否';

                        const newRow = page.addTableRow({
                            cells: [
                                templateCode,
                                templateName,
                                warehouse,
                                flowType,
                                outboundType,
                                outboundBizType,
                                { value: isEnabled, isStatus: true },
                                page.getCurrentTimeStr(),
                                '当前用户'
                            ]
                        });
                        if (newRow) {
                            newRow.dataset.isHidden = isHidden;
                            newRow.dataset.groupByOwner = groupByOwner;
                            newRow.dataset.allowNegativeInventory = allowNegativeInventory;
                        }
                        showToast('波次模板已保存', 'success');
                    }
                },
                editModal: {
                    modalId: 'waveTemplateEditModal',
                    cancelBtnId: 'editCancelBtn',
                    saveBtnId: 'editSaveBtn',
                    validations: [
                        { id: 'editWarehouse', message: '请选择仓库', required: true },
                        { id: 'editTemplateCode', message: '请输入波次模板编码', required: true },
                        { id: 'editTemplateName', message: '请输入波次模板名称', required: true },
                        { id: 'editFlowType', message: '请选择流程类型', required: true },
                        { id: 'editOutboundType', message: '请选择出库类型', required: true },
                        { id: 'editOutboundBizType', message: '请选择出库业务类型', required: true },
                        { id: 'editIsEnabled', message: '请选择是否启用', required: true }
                    ],
                    onSave: () => {
                        if (!page.currentEditRow) return;
                        const isHidden = document.querySelector('input[name="editIsHidden"]:checked')?.value || '否';
                        const groupByOwner = document.querySelector('input[name="editGroupByOwner"]:checked')?.value || '是';
                        const allowNegativeInventory = document.querySelector('input[name="editAllowNegativeInventory"]:checked')?.value || '否';
                        page.updateTableRow(page.currentEditRow, {
                            1: document.getElementById('editTemplateCode').value.trim(),
                            2: document.getElementById('editTemplateName').value.trim(),
                            3: document.getElementById('editWarehouse').value.trim(),
                            4: document.getElementById('editFlowType').value.trim(),
                            5: document.getElementById('editOutboundType').value.trim(),
                            6: document.getElementById('editOutboundBizType').value.trim(),
                            7: { value: document.getElementById('editIsEnabled').value.trim(), isStatus: true },
                            8: page.getCurrentTimeStr(),
                            9: '当前用户'
                        });
                        page.currentEditRow.dataset.isHidden = isHidden;
                        page.currentEditRow.dataset.groupByOwner = groupByOwner;
                        page.currentEditRow.dataset.allowNegativeInventory = allowNegativeInventory;
                        showToast('波次模板已更新', 'success');
                        page.currentEditRow = null;
                    },
                    mapRowToForm: (row) => {
                        page.currentEditRow = row;
                        const cells = row.querySelectorAll('td');
                        setRadioValue('editIsHidden', row.dataset.isHidden || '否');
                        syncGroupByOwner(true, row.dataset.groupByOwner || '是');
                        const flowType = cells[4].textContent.trim();
                        handleFlowTypeChange(true, {
                            flowType,
                            prevFlowType: flowType,
                            value: row.dataset.allowNegativeInventory || '否'
                        });
                        return {
                            editTemplateCode: cells[1].textContent,
                            editTemplateName: cells[2].textContent,
                            editWarehouse: cells[3].textContent,
                            editFlowType: cells[4].textContent,
                            editOutboundType: cells[5].textContent,
                            editOutboundBizType: cells[6].textContent,
                            editIsEnabled: cells[7].querySelector('.status').textContent
                        };
                    }
                },
                deleteModal: {
                    modalId: 'confirmDeleteModal',
                    closeBtnId: 'confirmDeleteCloseBtn',
                    cancelBtnId: 'cancelDeleteBtn',
                    confirmBtnId: 'confirmDeleteBtn'
                }
            });

            renderSelectOptions('searchFlowTypeDropdown', CommonOptions.flowType);
            renderSelectOptions('searchOutboundTypeDropdown', CommonOptions.outboundType);
            renderSelectOptions('searchOutboundBizTypeDropdown', CommonOptions.outboundBizType);
            page.init();
            bindFlowTypeSync();
            document.getElementById('editCloseBtn').addEventListener('click', () => page.closeModal('edit'));

            // 监听仓库切换，保持新增/编辑弹窗字段同步
            document.addEventListener('warehouseChange', (e) => {
                const { code, name } = e.detail;
                const warehouseInput = document.getElementById('warehouse');
                if (warehouseInput) {
                    warehouseInput.value = `${code}-${name}`;
                    warehouseInput.dataset.value = code;
                }
                const editWarehouseInput = document.getElementById('editWarehouse');
                if (editWarehouseInput) {
                    editWarehouseInput.value = `${code}-${name}`;
                    editWarehouseInput.dataset.value = code;
                }
            });
        });
    </script>
</body>
</html>
